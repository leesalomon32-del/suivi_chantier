<!-- Bibliothèque Supabase retirée pour isolation locale totale -->
<script>
/**
 * =========================================================================
 * MOTEUR MAGIQUE : INDEXEDDB (LE GRAND MEUBLE DE RANGEMENT)
 * =========================================================================
 */
const DB_NAME = "GenieCivilPro_DB";
const DB_VERSION = 1;
let dbInstance = null;

// Fonction pour ouvrir le meuble et fabriquer les 3 tiroirs
function initialiserLeMeubleDB() {
    return new Promise((resolve, reject) => {
        let requete = indexedDB.open(DB_NAME, DB_VERSION);

        requete.onupgradeneeded = function(e) {
            let db = e.target.result;
            // Tiroir 1 : Les projets
            if (!db.objectStoreNames.contains("projets")) {
                db.createObjectStore("projets", { keyPath: "id" });
            }
            // Tiroir 2 : Les utilisateurs
            if (!db.objectStoreNames.contains("utilisateurs")) {
                db.createObjectStore("utilisateurs", { keyPath: "id" });
            }
            // Tiroir 3 : Les dossiers techniques
            if (!db.objectStoreNames.contains("dossiers_techniques")) {
                db.createObjectStore("dossiers_techniques");
            }
        };

        requete.onsuccess = function(e) {
            dbInstance = e.target.result;
            resolve(dbInstance);
        };

        requete.onerror = function(e) {
            reject("Impossible d'ouvrir le meuble de stockage.");
        };
    });
}

// Outils pour ranger et lire dans le meuble magique
function lireDonneeDB(tiroir, cle) {
    return new Promise((resolve) => {
        let transaction = dbInstance.transaction([tiroir], "readonly");
        let magasin = transaction.objectStore(tiroir);
        let requete = magasin.get(cle);
        requete.onsuccess = () => resolve(requete.result);
        requete.onerror = () => resolve(null);
    });
}

function lireToutesLesDonneesDB(tiroir) {
    return new Promise((resolve) => {
        let transaction = dbInstance.transaction([tiroir], "readonly");
        let magasin = transaction.objectStore(tiroir);
        let requete = magasin.getAll();
        requete.onsuccess = () => resolve(requete.result || []);
        requete.onerror = () => resolve([]);
    });
}

function ecrireDonneeDB(tiroir, objet, cleOptionnelle) {
    return new Promise((resolve) => {
        let transaction = dbInstance.transaction([tiroir], "readwrite");
        let magasin = transaction.objectStore(tiroir);
        let requete = cleOptionnelle !== undefined ? magasin.put(objet, cleOptionnelle) : magasin.put(objet);
        requete.onsuccess = () => resolve(true);
        requete.onerror = () => resolve(false);
    });
}

function effacerDonneeDB(tiroir, cle) {
    return new Promise((resolve) => {
        let transaction = dbInstance.transaction([tiroir], "readwrite");
        let magasin = transaction.objectStore(tiroir);
        let requete = magasin.delete(cle);
        requete.onsuccess = () => resolve(true);
        requete.onerror = () => resolve(false);
    });
}
/**
 * =========================================================================
 * LOGIQUE APPLICATION : COMPTES ET COMPORTEMENT DE L'INTERFACE
 * =========================================================================
 */
let listeProjetsGlobal = [];
let idProjetActif = null;
let etatsDossiersReplies = {};
let userRoleActuel = localStorage.getItem("session_user_role") || "agents";
let userLotsAutorises = [];
try { userLotsAutorises = JSON.parse(localStorage.getItem("session_user_lots")) || []; } catch(e) { userLotsAutorises = []; }

function toggleSidebarLeft() {
    let layout = document.getElementById('mainAppLayout');
    if (layout.classList.contains('no-sidebar-left')) { layout.classList.remove('no-sidebar-left'); } 
    else if (layout.classList.contains('no-sidebars')) { layout.classList.remove('no-sidebars'); layout.classList.add('no-sidebar-right'); } 
    else if (layout.classList.contains('no-sidebar-right')) { layout.classList.add('no-sidebars'); } 
    else { layout.classList.add('no-sidebar-left'); }
}

function toggleSidebarRight() {
    let layout = document.getElementById('mainAppLayout');
    if (layout.classList.contains('no-sidebar-right')) { layout.classList.remove('no-sidebar-right'); } 
    else if (layout.classList.contains('no-sidebars')) { layout.classList.remove('no-sidebars'); layout.classList.add('no-sidebar-left'); } 
    else if (layout.classList.contains('no-sidebar-left')) { layout.classList.add('no-sidebars'); } 
    else { layout.classList.add('no-sidebar-right'); }
}

// DÉMARRAGE DE L'APPLICATION (Asynchrone et propre)
window.onload = async function() {
    if (localStorage.getItem("session_securisee_active_gc") !== "VALIDE") { 
        window.location.href = "1_login.html"; 
        return; 
    }
 
    // 1. Activation du stockage local géant
    await initialiserLeMeubleDB();
 
    // 2. Bouton d'accès Administrateur
    if (userRoleActuel === "admin") {
        let navbar = document.querySelector('.navbar-top-actions');
        if (navbar) {
            let btnAdmin = document.createElement('button'); 
            btnAdmin.className = "btn btn-primary"; 
            btnAdmin.style.cssText = "background:var(--accent-amber); padding:6px 12px; font-size:11px; cursor:pointer;";
            btnAdmin.innerText = "Paramètres Admin ";
            btnAdmin.onclick = function() { window.location.href = "2_admin.html"; };
            navbar.insertBefore(btnAdmin, navbar.firstChild);
        }
    }
 
    if (userRoleActuel === "agents") {
        document.querySelectorAll('.col-menu .card-nav').forEach(carte => {
            let act = carte.getAttribute('onclick') || "";
            if (!act.includes('7_avancement.html') && !act.includes('8_ccpms.html') && !act.includes('9_pv.html') && !act.includes('10_recap.html')) { 
                carte.style.display = "none"; 
            }
        });
    }
 
    // CHARGEMENT DES PROJETS (Les faux exemples parasites ont été retirés)
    listeProjetsGlobal = await lireToutesLesDonneesDB("projets");
    
    if(listeProjetsGlobal.length > 0) {
        idProjetActif = localStorage.getItem("id_projet_actif_lee") || String(listeProjetsGlobal[0].id);
        listeProjetsGlobal.forEach(p => { if(p.type === 'PAPA') etatsDossiersReplies[p.id] = false; });
    }

    renderProjetsSidebar(); 
    if(idProjetActif) {
        await chargerFicheProjetSelectionne();
    }
};

function renderProjetsSidebar() {
    let container = document.getElementById('listeProjetsContainer'); 
    if(!container) return; 
    container.innerHTML = "";
    
    let racines = listeProjetsGlobal.filter(p => p.type === 'PAPA' || p.type === 'CLASSIQUE');
    racines.forEach(r => {
        if (userRoleActuel !== "admin" && userRoleActuel !== "cadres" && !userLotsAutorises.includes(String(r.id))) {
            if (!listeProjetsGlobal.some(e => e.type === 'ENFANT' && e.parentId == r.id && userLotsAutorises.includes(String(e.id)))) return;
        }
        let blockParent = document.createElement('div'); 
        let estActif = idProjetActif == r.id ? 'active' : '';
        let icone = r.type === 'PAPA' ? '🏢' : '💼';
        let flecheHTML = r.type === 'PAPA' ? `<span class="project-arrow ${etatsDossiersReplies[r.id] ? 'collapsed':''}" onclick="toggleDossierAccordéon(${r.id}, event)">▼</span>` : "";
        blockParent.className = `project-item ${estActif}`; 
        blockParent.innerHTML = `<span onclick="selectionnerProjetLigne(${r.id})">${icone}</span><span class="project-item-text" onclick="selectionnerProjetLigne(${r.id})">${r.nom}</span>${flecheHTML}`;
        container.appendChild(blockParent);
        
        if (r.type === 'PAPA') {
            let childContainer = document.createElement('div'); 
            childContainer.className = "child-container" + (etatsDossiersReplies[r.id] ? ' hidden' : '');
            listeProjetsGlobal.filter(p => p.type === 'ENFANT' && p.parentId == r.id).forEach(e => {
                if (userRoleActuel !== "admin" && userRoleActuel !== "cadres" && !userLotsAutorises.includes(String(e.id))) return;
                let divE = document.createElement('div'); 
                divE.className = `project-item project-child ${idProjetActif == e.id ? 'active' : ''}`;
                divE.innerHTML = `<span class="project-item-text" onclick="selectionnerProjetLigne(${e.id})"> ↳ ${e.nom}</span>`;
                childContainer.appendChild(divE);
            });
            container.appendChild(childContainer);
        }
    });
}

function toggleDossierAccordéon(papaId, event) { 
    event.stopPropagation(); 
    etatsDossiersReplies[papaId] = !etatsDossiersReplies[papaId]; 
    renderProjetsSidebar(); 
}

async function selectionnerProjetLigne(id) { 
    idProjetActif = id; 
    localStorage.setItem("id_projet_actif_lee", idProjetActif); 
    renderProjetsSidebar(); 
    await chargerFicheProjetSelectionne(); 
}
async function chargerFicheProjetSelectionne() {
    if (!idProjetActif || listeProjetsGlobal.length === 0) return;
    let p = listeProjetsGlobal.find(i => i.id == idProjetActif); 
    if(!p) return;
    
    let d = await lireDonneeDB("dossiers_techniques", `charte_administrative_${idProjetActif}`) || {};
    let m = {};
    if (p.type === "ENFANT" && p.parentId) {
        m = await lireDonneeDB("dossiers_techniques", `charte_administrative_${p.parentId}`) || {};
    }
    
    let nomProjetAffiche = p.type === "ENFANT" ? `${(listeProjetsGlobal.find(i => i.id == p.parentId)?.nom || m.objet || "").toUpperCase()} — (${p.nom.toUpperCase()})` : p.nom.toUpperCase();
 
    document.getElementById('txtProjetActifLabelTop').innerText = "PROJET SÉLECTIONNÉ : " + p.nom.toUpperCase();
    document.getElementById('lblNomProjet').innerText = nomProjetAffiche;
    document.getElementById('lblFin').innerText = d.financement || m.financement || "-";
    document.getElementById('lblMO').innerText = d.mo || m.mo || "-";
    document.getElementById('lblMOE').innerText = d.moe || m.moe || "-";
    document.getElementById('lblEnt').innerText = d.entreprise || m.entreprise || "-";
    document.getElementById('lblNumContrat').innerText = d.numContrat || m.numContrat || "-";
    
    let zoneNotes = document.getElementById('blocNotesAdmin');
    if (zoneNotes) {
        zoneNotes.value = p.bloc_notes || "";
        if (userRoleActuel !== "admin" && userRoleActuel !== "cadres") { 
            zoneNotes.readOnly = true; 
            zoneNotes.style.background = "#f1f5f9"; 
            zoneNotes.placeholder = " Lecture seule 🔒"; 
        } else { 
            zoneNotes.readOnly = false; 
            zoneNotes.style.background = "#fffdeb"; 
        }
    }
    
    let imgView = document.getElementById('mapImgView'); 
    let txtMapPlaceholder = document.getElementById('mapTxt');
    if(p.photoEmplacement && p.photoEmplacement.trim() !== "") { 
        imgView.src = p.photoEmplacement; 
        imgView.style.display = "block"; 
        txtMapPlaceholder.style.display = "none"; 
    } else { 
        imgView.style.display = "none"; 
        txtMapPlaceholder.style.display = "block"; 
    }
    await lancerCalculsConsolidationFiche(p);
}

async function lancerCalculsConsolidationFiche(p) {
    let totalInitial = 0; let totalAvenants = 0; let totalLignesSuivi = 0; 
    let sumPhyRatio = 0; let mntMarchatTotal = 0; let mntRealiseTotal = 0; 
    let dateMinProjet = null; let dateMaxProjet = null;
 
    let chantiers = [p]; 
    if (p.type === "PAPA") {
        chantiers = chantiers.concat(listeProjetsGlobal.filter(item => item.type === "ENFANT" && item.parentId == p.id));
    }
    
    for (let c of chantiers) {
        let dataBdqe = await lireDonneeDB("dossiers_techniques", `bdqe_${c.id}`) || [];
        let dataAvenants = await lireDonneeDB("dossiers_techniques", `avenants_${c.id}`) || [];
        let dataPlanning = await lireDonneeDB("dossiers_techniques", `planning_${c.id}`) || [];
        let dataSuivi = await lireDonneeDB("dossiers_techniques", `suivi_${c.id}`) || [];

        dataBdqe.forEach(i => totalInitial += (i.total || 0)); 
        dataAvenants.forEach(i => totalAvenants += (i.total_av || 0));
        
        dataPlanning.forEach(item => { 
            if (item.date_debut && item.date_fin) { 
                let d1 = new Date(item.date_debut); let d2 = new Date(item.date_fin); 
                if (!dateMinProjet || d1 < dateMinProjet) dateMinProjet = d1; 
                if (!dateMaxProjet || d2 > dateMaxProjet) dateMaxProjet = d2; 
            } 
        });
        
        dataSuivi.forEach(item => { 
            if (item.quantite_contrat > 0) { 
                totalLignesSuivi++; 
                let pL = Math.min((item.qte_realisee / item.quantite_contrat) * 100, 100); 
                sumPhyRatio += pL; 
                mntMarchatTotal += (item.total_contrat || 0); 
                mntRealiseTotal += ((item.total_contrat || 0) * (pL / 100)); 
            } 
        });
    }
 
    document.getElementById('txtBudgetFiche').innerText = totalInitial > 0 ? (totalInitial + totalAvenants).toLocaleString('fr-FR', {minimumFractionDigits:2}) + " Ar" : "0,00 Ar";
    let rowAvLbl = document.getElementById('txtDetailAvenantFiche'); 
    if(totalAvenants !== 0) { 
        rowAvLbl.innerText = `Dont Avenants : ${totalAvenants >= 0 ? '+':''}${totalAvenants.toLocaleString('fr-FR')} Ar`; 
        rowAvLbl.style.display = "block"; 
    } else { 
        rowAvLbl.style.display = "none"; 
    }
    
    if (dateMinProjet && dateMaxProjet) {
        let auj = new Date(); 
        let dTotale = Math.ceil(Math.abs(dateMaxProjet - dateMinProjet) / (1000*60*60*24)) + 1; 
        let dEcoulee = Math.max(0, Math.min(dTotale, Math.ceil((auj - dateMinProjet) / (1000*60*60*24))));
        document.getElementById('txtCalculCalendrier').innerHTML = `<b>${dEcoulee}/${dTotale} jours</b> (${Math.round((dEcoulee / dTotale) * 100)}%)<br><span style="font-size:11px;color:grey;">Période : ${dateMinProjet.toLocaleDateString('fr-FR')} — ${dateMaxProjet.toLocaleDateString('fr-FR')}</span>`;
    } else { 
        document.getElementById('txtCalculCalendrier').innerText = "Aucun calendrier planifié."; 
    }
    
    let tPhy = totalLignesSuivi > 0 ? (sumPhyRatio / totalLignesSuivi) : 0; 
    let tFin = mntMarchatTotal > 0 ? (mntRealiseTotal / mntMarchatTotal) * 100 : 0;
    document.getElementById('txtPctPhy').innerText = tPhy.toFixed(2) + "%"; 
    document.getElementById('barPctPhy').style.width = tPhy + "%";
    document.getElementById('txtPctFin').innerText = tFin.toFixed(2) + "%"; 
    document.getElementById('barPctFin').style.width = tFin + "%";
}
function filtrerLaListeDesProjets() {
    let motCle = document.getElementById('searchProjInput').value.toLowerCase().trim();
    document.querySelectorAll('#listeProjetsContainer .project-item').forEach(item => { 
        item.style.display = (!motCle || item.querySelector('.project-item-text').innerText.toLowerCase().includes(motCle)) ? "flex" : "none"; 
    });
}

function ouvrirVraiePageLien(fichierHtml) { 
    if(!idProjetActif) return alert("Sélectionnez d'abord un projet à gauche !"); 
    localStorage.setItem("id_projet_en_cours_de_saisie_temporaire", idProjetActif); 
    window.location.href = fichierHtml; 
}

function deconnecterSessionConsole() { 
    if(confirm(" Souhaitez-vous fermer votre session ? ")) { 
        localStorage.removeItem("session_securisee_active_gc"); 
        localStorage.removeItem("session_user_login"); 
        localStorage.removeItem("session_user_role"); 
        localStorage.removeItem("session_user_lots"); 
        window.location.href = "1_login.html"; 
    } 
}

async function sauvegarderBlocNotesLocal(valeur) { 
    let p = listeProjetsGlobal.find(i => i.id == idProjetActif); 
    if(p) { 
        p.bloc_notes = valeur; 
        await ecrireDonneeDB("projets", p);
    } 
}

async function sauvegarderPhotoEmplacement(input) { 
    if (input.files && input.files) {
        let reader = new FileReader(); 
        reader.onload = async function(e) { 
            let imgData = e.target.result; 
            let p = listeProjetsGlobal.find(i => i.id == idProjetActif); 
            if(p) { 
                p.photoEmplacement = imgData; 
                await ecrireDonneeDB("projets", p);
            } 
            let listC = await lireDonneeDB("dossiers_techniques", `ccpms_${idProjetActif}`) || [];
            listC.unshift({
                id: Date.now(), categorie: "Photos", dateDoc: new Date().toISOString().substring(0,10), 
                titre: `[Fiche] - Emplacement : ${p.nom}`, description: `Plan mémorisé.`, 
                fichierBrut: imgData, nomFichier: `Emplacement_${p.nom}.jpg`, typeMime: "image/jpeg" 
            }); 
            await ecrireDonneeDB("dossiers_techniques", listC, `ccpms_${idProjetActif}`); 
            document.getElementById('mapImgView').src = imgData; 
            document.getElementById('mapImgView').style.display = "block"; 
            document.getElementById('mapTxt').style.display = "none"; 
            alert(" Succès ! "); 
        }; 
        reader.readAsDataURL(input.files); 
    } 
}

async function exporterFichierClasseurJsonAccueil() {
    let projets = await lireToutesLesDonneesDB("projets");
    let utilisateurs = await lireToutesLesDonneesDB("utilisateurs");
    
    let toutesLesChartes = {}; let bdqeIsolees = {}; let ccpmsIsolees = {}; let suiviIsolees = {}; let planningIsolees = {};
    for (let p of projets) {
        let charte = await lireDonneeDB("dossiers_techniques", `charte_administrative_${p.id}`); if(charte) toutesLesChartes[p.id] = charte;
        let bdqe = await lireDonneeDB("dossiers_techniques", `bdqe_${p.id}`); if(bdqe) bdqeIsolees[p.id] = bdqe;
        let ccpms = await lireDonneeDB("dossiers_techniques", `ccpms_${p.id}`); if(ccpms) ccpmsIsolees[p.id] = ccpms;
        let suivi = await lireDonneeDB("dossiers_techniques", `suivi_${p.id}`); if(suivi) suiviIsolees[p.id] = suivi;
        let planning = await lireDonneeDB("dossiers_techniques", `planning_${p.id}`); if(planning) planningIsolees[p.id] = planning;
    }

    let paquetGlobalData = { 
        dateExport: new Date().toISOString(), projets: projets, utilisateurs: utilisateurs, 
        chartesIsolees: toutesLesChartes, bdqeIsolees: bdqeIsolees, ccpmsIsolees: ccpmsIsolees, suiviIsolees: suiviIsolees, planningIsolees: planningIsolees
    };
    
    let blob = new Blob([JSON.stringify(paquetGlobalData, null, 2)], { type: "application/json" });
    let lien = document.createElement("a"); lien.href = URL.createObjectURL(blob); lien.download = `GENIE_CIVIL_PRO_DATABASE_MASTER.json`;
    document.body.appendChild(lien); lien.click(); document.body.removeChild(lien);
    alert(" Succès ! Base globale compilée localement depuis IndexedDB."); 
}

async function importerFichierClasseurJsonAccueil(input) {
    if (input.files && input.files) {
        let reader = new FileReader();
        reader.onload = async function(e) {
            try {
                let paquet = JSON.parse(e.target.result);
                if (!paquet.projets) return alert(" Fichier JSON invalide."); 
 
                if (confirm(" ATTENTION : Écraser tout le contenu du Meuble IndexedDB par ce fichier ?")) {
                    await dbInstance.transaction(["projets"], "readwrite").objectStore("projets").clear();
                    await dbInstance.transaction(["utilisateurs"], "readwrite").objectStore("utilisateurs").clear();
                    await dbInstance.transaction(["dossiers_techniques"], "readwrite").objectStore("dossiers_techniques").clear();

                    for(let prj of paquet.projets) { await ecrireDonneeDB("projets", prj); }
                    if (paquet.utilisateurs) { for(let usr of paquet.utilisateurs) { await ecrireDonneeDB("utilisateurs", usr); } }
 
                    if (paquet.chartesIsolees) { for (let id in paquet.chartesIsolees) await ecrireDonneeDB("dossiers_techniques", paquet.chartesIsolees[id], `charte_administrative_${id}`); }
                    if (paquet.bdqeIsolees) { for (let id in paquet.bdqeIsolees) await ecrireDonneeDB("dossiers_techniques", paquet.bdqeIsolees[id], `bdqe_${id}`); }
                    if (paquet.ccpmsIsolees) { for (let id in paquet.ccpmsIsolees) await ecrireDonneeDB("dossiers_techniques", paquet.ccpmsIsolees[id], `ccpms_${id}`); }
                    if (paquet.suiviIsolees) { for (let id in paquet.suiviIsolees) await ecrireDonneeDB("dossiers_techniques", paquet.suiviIsolees[id], `suivi_${id}`); }
                    if (paquet.planningIsolees) { for (let id in paquet.planningIsolees) await ecrireDonneeDB("dossiers_techniques", paquet.planningIsolees[id], `planning_${id}`); }
 
                    alert(" Base globale restaurée avec succès !"); window.location.reload();
                }
            } catch (err) { alert(" Erreur de lecture du fichier JSON."); }
        };
        reader.readAsText(input.files);
    }
}
</script>
