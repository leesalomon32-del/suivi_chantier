<!DOCTYPE html>
<html lang="fr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Génie Civil Pro - Planning & Gantt</title>
 <style>
 :root {
 --primary-color: #0f172a;
 --sidebar-bg: #1e293b;
 --accent-blue: #2563eb;
 --accent-amber: #d97706;
 --success-green: #16a34a;
 --danger-red: #ef4444;
 --bg-light: #f8fafc;
 --text-dark: #334155;
 --border-color: #cbd5e1;
 --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
 }
 body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-light); color: var(--text-dark); margin: 0; padding: 20px; height: 100vh; overflow: hidden; box-sizing: border-box; }
 .gantt-container { max-width: 100%; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: var(--card-shadow); height: calc(100vh - 40px); display: flex; flex-direction: column; gap: 12px; box-sizing: border-box; }
 h1 { color: var(--primary-color); border-bottom: 3px solid #64748b; padding-bottom: 10px; margin-top: 0; font-size: 18px; font-weight: 900; }
 .toggle-form-btn { width: 100%; background: #f1f5f9; border: 1px dashed var(--accent-blue); color: var(--accent-blue); padding: 8px; font-weight: bold; border-radius: 6px; cursor: pointer; text-align: center; font-size: 12px; text-transform: uppercase; transition: background 0.2s; flex-shrink: 0; }
 .toggle-form-btn:hover { background: #e2e8f0; }
 .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; background: #f8fafc; padding: 15px; border-radius: 6px; border: 1px solid var(--border-color); flex-shrink: 0; display: none; align-items: flex-end; }
 .form-group.open { display: grid; }
 .form-field { display: flex; flex-direction: column; gap: 3px; }
 .form-field label { font-size: 11px; font-weight: bold; color: var(--primary-dark); text-transform: uppercase; }
 .form-field input, .form-field select { padding: 6px 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; outline: none; background: white; }
 .btn { padding: 8px 14px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; font-size: 11px; display: inline-flex; align-items: center; gap: 5px; text-transform: uppercase; height: 33px; box-sizing: border-box; justify-content: center; }
 .btn-primary { background-color: var(--accent-blue); }
 .btn-secondary { background-color: #64748b; }
 .btn-danger { background-color: var(--danger-red); }
 .filter-section { background: #f8fafc; padding: 8px 12px; border-radius: 6px; border: 1px solid #e2e8f0; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; }
 .filter-title { font-weight: bold; color: #64748b; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
 .segment-btn { background: white; border: 1px solid var(--accent-blue); color: var(--accent-blue); padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; margin-right: 5px; }
 .segment-btn.active { background: var(--accent-blue); color: white; }
 .workspace-table-scroll { flex-grow: 1; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 8px; }
 table { width: 100%; border-collapse: collapse; }
 th { background-color: var(--primary-color); color: white; position: sticky; top: 0; z-index: 10; padding: 10px; font-size: 11px; text-transform: uppercase; text-align: left; }
 td { border-bottom: 1px solid #e2e8f0; padding: 8px; font-size: 13px; vertical-align: middle; }
 tr:nth-child(even) { background-color: #f8fafc; }
 .gantt-bar-container { background: #e2e8f0; border-radius: 4px; height: 14px; width: 100%; position: relative; overflow: hidden; }
 .gantt-bar-fill { background: var(--accent-blue); height: 100%; border-radius: 4px; position: absolute; }
 @media (max-width: 768px) {
 body { padding: 5px; }
 .gantt-container { height: calc(100vh - 10px); padding: 10px; gap: 8px; }
 th:nth-child(1), td:nth-child(1) { display: none; }
 }
 </style>
</head>
<body>
<div class="gantt-container">
 <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; flex-shrink: 0;">
 <h1 style="margin:0;">Module 6 : Calendrier d'Exécution & Avancement Gantt 📅</h1>
 <button class="btn btn-secondary" onclick="window.location.href='3_accueil.html'">« Retour Accueil</button>
 </div>
 <button class="toggle-form-btn" onclick="basculerAffichageFormulaireTiroir()">Ouvrir les Outils de Planification 🛠</button>
 <div class="form-group" id="formPlanningLigne">
 <div class="form-field" style="grid-column: span 2;"><label>Grand Ouvrage / Site</label><input type="text" id="inOuvrage" placeholder="Ex: Terrassement"></div>
 <div class="form-field"><label>Code Tâche</label><input type="text" id="inCode" placeholder="Ex: 1.1"></div>
 <div class="form-field" style="grid-column: span 2;"><label>Désignation de l'Activité</label><input type="text" id="inDesignation" placeholder="Ex: Décapage du sol"></div>
 <div class="form-field"><label>Date Début</label><input type="date" id="inDebut"></div>
 <div class="form-field"><label>Date Fin Contractuelle</label><input type="date" id="inFin"></div>
 <div class="form-field" style="justify-content: flex-end;"><button class="btn btn-primary" onclick="ajouterNouvelleTacheManuelle()">Planifier Tâche ➕</button></div>
 </div>
 <div class="filter-section">
 <div class="filter-title">🔍 Segment : Filtrer le Calendrier par Ouvrage</div>
 <div class="segment-container" id="boxSegmentsOuvragesPlanning" style="overflow-x:auto; white-space:nowrap; flex-wrap:nowrap; padding-bottom:3px;"></div>
 </div>
 <div class="workspace-table-scroll">
 <table id="tablePlanningGantt">
 <thead>
 <tr>
 <th style="width:180px;">Ouvrage / Site</th>
 <th style="width:75px;">Code</th>
 <th>Désignation de la Tâche</th>
 <th style="width:100px;">Début</th>
 <th style="width:100px;">Fin Prévue</th>
 <th style="width:90px; text-align:center;">Durée (J)</th>
 <th style="width:180px;">Visualisation Chronologique Gantt</th>
 <th style="width:45px; text-align:center;" class="col-action-modification">Action</th>
 </tr>
 </thead>
 <tbody id="tbodyPlanningGrid"></tbody>
 </table>
 </div>
</div>
<script>
const DB_NAME = "GenieCivilPro_DB";
const DB_VERSION = 1;
let dbInstance = null;

function initialiserLeMeubleDB() {
    return new Promise((resolve, reject) => {
        let requete = indexedDB.open(DB_NAME, DB_VERSION);
        requete.onsuccess = function(e) { dbInstance = e.target.result; resolve(dbInstance); };
        requete.onerror = function() { reject("Meuble bloqué."); };
    });
}

function lireDonneeDB(tiroir, cle) {
    return new Promise((resolve) => {
        if(!dbInstance) return resolve(null);
        let tx = dbInstance.transaction([tiroir], "readonly");
        let req = tx.objectStore(tiroir).get(cle);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => resolve(null);
    });
}

function ecrireDonneeDB(tiroir, objet, cleOptionnelle) {
    return new Promise((resolve) => {
        if(!dbInstance) return resolve(false);
        let tx = dbInstance.transaction([tiroir], "readwrite");
        let req = cleOptionnelle !== undefined ? tx.objectStore(tiroir).put(objet, cleOptionnelle) : tx.objectStore(tiroir).put(objet);
        req.onsuccess = () => resolve(true);
        req.onerror = () => resolve(false);
    });
}

function effacerDonneeDB(tiroir, cle) {
    return new Promise((resolve) => {
        if(!dbInstance) return resolve(false);
        let tx = dbInstance.transaction([tiroir], "readwrite");
        let req = tx.objectStore(tiroir).delete(cle);
        req.onsuccess = () => resolve(true);
        req.onerror = () => resolve(false);
    });
}

let listePlanning = [];
let filtreOuvrageActif = "TOUS";
let idProjetCourant = localStorage.getItem("id_projet_en_cours_de_saisie_temporaire") || "101";
const CLE_PLANNING_PROJET = `planning_${idProjetCourant}`;

function basculerAffichageFormulaireTiroir() {
    let form = document.getElementById('formPlanningLigne');
    let btn = document.querySelector('.toggle-form-btn');
    form.classList.toggle('open');
    if (form.classList.contains('open')) {
        btn.innerText = "Fermer la Console de Planification ❌";
        btn.style.cssText = "background:#fee2e2; color:var(--danger-red); border-color:var(--danger-red);";
    } else {
        btn.innerText = "Ouvrir les Outils de Planification 🛠";
        btn.style.cssText = "background:#f1f5f9; color:var(--accent-blue); border-color:var(--accent-blue);";
    }
}
window.onload = function() {
    let userRoleActuel = localStorage.getItem("session_user_role") || "agents";
    let userLotsAutorises = [];
    try { userLotsAutorises = JSON.parse(localStorage.getItem("session_user_lots")) || []; } catch(e) {}
    
    initialiserLeMeubleDB().then(async () => {
        if (userRoleActuel === "agents" || (userRoleActuel === "controle" && !userLotsAutorises.includes(String(idProjetCourant)))) {
            let formSaisie = document.getElementById('formPlanningLigne');
            if (formSaisie) formSaisie.style.display = 'none';
            document.querySelector('.toggle-form-btn').style.display = 'none';
            let alerte = document.createElement('div');
            alerte.style.cssText = "background:#eff6ff; color:#1e40af; padding:10px; border-radius:6px; font-weight:bold; margin-bottom:15px; border:1px solid #bfdbfe; font-size:13px; text-align:center;";
            alerte.innerText = "Mode Consultation Calendrier (Lecture Seule 🔒)";
            if (formSaisie) formSaisie.parentNode.insertBefore(alerte, formSaisie);
            document.querySelector('.col-action-modification').style.display = 'none';
            window.modeLectureSeuleActive = true;
        }
        let donneesChargees = await lireDonneeDB("dossiers_techniques", CLE_PLANNING_PROJET);
        listePlanning = donneesChargees ? donneesChargees : [];
        rechargerTout();
    });
};

function ajouterNouvelleTacheManuelle() {
    let ouvrage = document.getElementById('inOuvrage').value.trim();
    let code_gantt = document.getElementById('inCode').value.trim();
    let designation = document.getElementById('inDesignation').value.trim();
    let date_debut = document.getElementById('inDebut').value;
    let date_fin = document.getElementById('inFin').value;
    if (!ouvrage || !code_gantt || !designation || !date_debut || !date_fin) {
        return alert("Veuillez remplir tous les champs de planification.");
    }
    listePlanning.push({ ouvrage, code_gantt, designation, date_debut, date_fin });
    document.getElementById('inCode').value = ""; document.getElementById('inOuvrage').value = ""; document.getElementById('inDesignation').value = "";
    document.getElementById('inDebut').value = ""; document.getElementById('inFin').value = "";
    rechargerTout();
}

function trierPlanningAlphanumerique() {
    listePlanning.sort((a, b) => {
        let comp = a.ouvrage.localeCompare(b.ouvrage, 'fr', { sensitivity: 'base' });
        if (comp !== 0) return comp;
        let partsA = String(a.code_gantt).split(/[\.,]/).map(Number);
        let partsB = String(b.code_gantt).split(/[\.,]/).map(Number);
        for (let i = 0; i < Math.max(partsA.length, partsB.length); i++) {
            let numA = partsA[i] || 0; let numB = partsB[i] || 0; if (numA !== numB) return numA - numB;
        }
        return 0;
    });
}

function supprimerTacheGantt(index) {
    if (confirm("Retirer cette tâche du planning ?")) { listePlanning.splice(index, 1); rechargerTout(); }
}

async function rechargerTout() {
    trierPlanningAlphanumerique(); genererBoutonsSegmentsOuvrages(); afficherGrillePlanningGantt();
    await ecrireDonneeDB("dossiers_techniques", listePlanning, CLE_PLANNING_PROJET);
}

function genererBoutonsSegmentsOuvrages() {
    let container = document.getElementById('boxSegmentsOuvragesPlanning'); if (!container) return; container.innerHTML = "";
    let ouvs = ["TOUS", ...new Set(listePlanning.map(item => item.ouvrage).filter(Boolean))];
    ouvs.forEach(ouv => {
        let btn = document.createElement('button'); btn.className = `segment-btn ${filtreOuvrageActif === ouv ? 'active' : ''}`; btn.innerText = ouv.toUpperCase();
        btn.onclick = function() { filtreOuvrageActif = ouv; rechargerTout(); }; container.appendChild(btn);
    });
}

function afficherGrillePlanningGantt() {
    let tbody = document.getElementById('tbodyPlanningGrid'); if (!tbody) return; tbody.innerHTML = "";
    if (listePlanning.length === 0) { tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#94a3b8; padding:30px; font-style:italic;">Le planning est vide.</td></tr>`; return; }
    
    let globalMin = null; let globalMax = null;
    listePlanning.forEach(item => {
        let d1 = new Date(item.date_debut); let d2 = new Date(item.date_fin);
        if (!globalMin || d1 < globalMin) globalMin = d1; if (!globalMax || d2 > globalMax) globalMax = d2;
    });
    let dTotaleProject = globalMin && globalMax ? Math.ceil(Math.abs(globalMax - globalMin) / (1000*60*60*24)) + 1 : 1;

    listePlanning.forEach((item, index) => {
        if (filtreOuvrageActif !== "TOUS" && item.ouvrage !== filtreOuvrageActif) return;
        let tDebut = new Date(item.date_debut); let tFin = new Date(item.date_fin);
        let dureeTache = Math.ceil(Math.abs(tFin - tDebut) / (1000*60*60*24)) + 1;
        
        let pctLeft = dTotaleProject > 1 ? ((tDebut - globalMin) / (1000*60*60*24)) / dTotaleProject * 100 : 0;
        let pctWidth = dTotaleProject > 1 ? dureeTache / dTotaleProject * 100 : 100;

        let action = window.modeLectureSeuleActive ? "" : `<td style="text-align:center;"><button class="btn" style="background:var(--danger-red); padding:3px 6px; font-size:10px;" onclick="supprimerTacheGantt(${index})">🗑</button></td>`;
        let tr = document.createElement('tr');
        tr.innerHTML = `<td><b>${item.ouvrage}</b></td><td style="font-family:monospace; font-weight:bold; color:var(--accent-blue);">${item.code_gantt}</td><td>${item.designation}</td><td>${tDebut.toLocaleDateString('fr-FR')}</td><td>${tFin.toLocaleDateString('fr-FR')}</td><td style="text-align:center; font-weight:bold;">${dureeTache} j</td><td><div class="gantt-bar-container"><div class="gantt-bar-fill" style="left:${pctLeft}%; width:${pctWidth}%;"></div></div></td>${action}`;
        tbody.appendChild(tr);
    });
}
</script>
</body>
</html>
