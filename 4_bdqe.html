<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Génie Civil Pro - BDQE</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 100%; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: var(--primary-color); border-bottom: 3px solid var(--secondary-color); padding-bottom: 10px; margin-top: 0; }
        .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; background: #f9fafb; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #e5e7eb; }
        .form-field { display: flex; flex-direction: column; }
        .form-field label { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: var(--primary-color); }
        .form-field input { padding: 8px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 14px; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; transition: background 0.2s; }
        .btn-primary { background-color: var(--secondary-color); }
        .btn-success { background-color: var(--success-color); }
        .btn-danger { background-color: var(--danger-color); }
        .actions-bar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        .filter-section { background: #eff6ff; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #bfdbfe; }
        .filter-title { font-weight: bold; color: var(--primary-color); margin-bottom: 10px; font-size: 14px; }
        .segment-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .segment-btn { background: white; border: 1px solid #3b82f6; color: #3b82f6; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 13px; }
        .segment-btn.active { background: #3b82f6; color: white; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #e5e7eb; padding: 10px; text-align: left; font-size: 14px; }
        th { background-color: var(--primary-color); color: white; }
        tr:nth-child(even) { background-color: #f9fafb; }
        .recap-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .recap-card { background: #f8fafc; border: 1px solid #cbd5e1; padding: 15px; border-radius: 6px; }
        .total-global { font-size: 20px; font-weight: bold; color: var(--primary-color); text-align: right; padding: 15px; background: #fef3c7; border-radius: 6px; border: 1px solid #fcd34d; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h1 style="margin:0;">📊 Module 4 : Saisie du BDQE Isolé</h1>
        <button class="btn btn-primary" onclick="window.location.href='3_accueil.html'" style="background:#475569;">« Retour Accueil</button>
    </div>
    
    <div class="actions-bar">
        <!-- Retour au liseur de fichier CSV ultra-rapide et local -->
        <input type="file" id="importCsvFile" accept=".csv" style="display:none" onchange="importerFichierCsvAnticrash(this)">
        <button class="btn btn-primary" onclick="document.getElementById('importCsvFile').click()" style="background:#16a34a;">📥 Importer un fichier Excel (.csv)</button>
        <button class="btn btn-success" onclick="exporterBordereauExcel()">📤 Export Fichier BDQE</button>
        <button class="btn btn-danger" onclick="nettoyerToutBDQE()">⚠️ Réinitialiser le BDQE</button>
    </div>

    <div class="form-group" id="formSaisie">
        <input type="hidden" id="editIndex" value="-1">
        <div class="form-field">
            <label>Ouvrage</label>
            <input type="text" id="ouvrage" placeholder="Saisir ou choisir..." list="listeSuggestionsOuvrages" required>
            <datalist id="listeSuggestionsOuvrages"></datalist>
        </div>
        <div class="form-field"><label>Code BDQE</label><input type="text" id="code_bdqe" placeholder="ex: 1.1" oninput="declencherAutoRemplissage()" required></div>
        <div class="form-field"><label>Structure</label><input type="text" id="structure" placeholder="Rempli auto."></div>
        <div class="form-field"><label>Désignation</label><input type="text" id="designation" placeholder="Description" required></div>
        <div class="form-field"><label>Unité</label><input type="text" id="unite" placeholder="ex: m3"></div>
        <div class="form-field"><label>Quantité</label><input type="text" id="quantite" placeholder="Optionnel"></div>
        <div class="form-field"><label>Prix Unitaire (Ar)</label><input type="text" id="prix_unitaire" placeholder="Optionnel"></div>
        <div class="form-field" style="justify-content: flex-end;"><button class="btn btn-primary" id="btnEnregistrer" onclick="enregistrerLigne()">Valider</button></div>
    </div>

    <div class="filter-section">
        <div class="filter-title">🔍 Segment : Filtrer par Ouvrage</div><div class="segment-container" id="segmentOuvrages"></div>
        <div class="filter-title">🔍 Segment : Filtrer par Structure</div><div class="segment-container" id="segmentStructures"></div>
    </div>

    <table id="tableBDQE">
        <thead>
            <tr><th>Ouvrage</th><th>Code BDQE</th><th>Structure</th><th>Désignation</th><th>Unité</th><th>Quantité</th><th>Prix Unitaire</th><th>Prix Total</th><th>Actions</th></tr>
        </thead>
        <tbody id="tbodyBDQE"></tbody>
    </table>

    <div class="recap-box">
        <div class="recap-card">
            <h3>📈 Récapitulatif par Ouvrage</h3>
            <table><thead><tr><th>Ouvrage</th><th>Montant Total</th></tr></thead><tbody id="tbodyRecapOuvrage"></tbody></table>
        </div>
        <div class="recap-card" style="display: flex; flex-direction: column; justify-content: center;">
            <div class="total-global" id="totalGlobal">Total Global du Projet : 0,00 Ar</div>
        </div>
    </div>
</div>
<script>
    let listeBDQE = [];
    let filtreOuvrageActif = "TOUS";
    let filtreStructureActif = "TOUS";
    
    let idProjetCourant = localStorage.getItem("id_projet_en_cours_de_saisie_temporaire") || "101";
    let cleStockageBDQE = `bdqe_${idProjetCourant}`;

    window.onload = function() {
             // --- CAPTEUR DE SÉCURITÉ ET RESTRICTION BDQE ---
        let userRoleActuel = localStorage.getItem("session_user_role") || "agents";
        let userLotsAutorises = [];
        try { userLotsAutorises = JSON.parse(localStorage.getItem("session_user_lots")) || []; } catch(e) {}

        if (userRoleActuel === "agents" || (userRoleActuel === "controle" && !userLotsAutorises.includes(String(idProjetCourant)))) {
            // 1. Masquage des boutons d'import/réinitialisation
            let actionsBar = document.querySelector('.actions-bar');
            if (actionsBar) actionsBar.innerHTML = `<span style="font-weight:bold; color:#1e3a8a; font-size:13px;">🔒 Mode Consultation Uniquement (Héritage Administratif)</span>`;
            
            // 2. Masquage du formulaire de saisie manuelle
            let formSaisie = document.getElementById('formSaisie');
            if (formSaisie) formSaisie.style.display = 'none';
        }
   
        let donneesSauvegardees = localStorage.getItem(cleStockageBDQE);
        if (donneesSauvegardees) {
            listeBDQE = JSON.parse(donneesSauvegardees);
            rechargerTout();
        }
    };
        // Nettoyage visuel de la colonne action pour les rôles restreints
    window.addEventListener('DOMContentLoaded', () => {
        let role = localStorage.getItem("session_user_role") || "agents";
        if (role === "agents") {
            let ths = document.querySelectorAll('table th');
            if(ths.length > 0 && ths[ths.length - 1].innerText.includes('Actions')) {
                ths[ths.length - 1].style.display = 'none';
            }
        }
    });


    function formatArgent(nombre) {
        if (nombre === null || nombre === undefined || isNaN(nombre)) return "";
        return nombre.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function trierDonnees() {
        listeBDQE.sort((a, b) => {
            let compOuvrage = a.ouvrage.localeCompare(b.ouvrage, 'fr', {sensitivity: 'base'});
            if (compOuvrage !== 0) return compOuvrage;
            let partsA = a.code_bdqe.split(/[\.,]/).map(Number);
            let partsB = b.code_bdqe.split(/[\.,]/).map(Number);
            for (let i = 0; i < Math.max(partsA.length, partsB.length); i++) {
                let numA = partsA[i] || 0; let numB = partsB[i] || 0;
                if (numA !== numB) return numA - numB;
            }
            return 0;
        });
    }

    function declencherAutoRemplissage() {
    let codeSaisi = document.getElementById('code_bdqe').value.trim();
    if (!codeSaisi) return;
    
    // Remplacement propre des virgules par des points pour garder la cohérence
    codeSaisi = codeSaisi.replace(',', '.');
    document.getElementById('code_bdqe').value = codeSaisi;

    // 1. RECHERCHE DE CORRESPONDANCE TOTALE (Code exact complet)
    // On cherche si ce code existe déjà précisément dans l'historique ou le dictionnaire BDQE
    let matchExact = listeBDQE.find(item => item.code_bdqe === codeSaisi);
    
    if (matchExact) {
        // Si trouvé, on remplit tout le formulaire d'un coup !
        if (matchExact.structure) document.getElementById('structure').value = matchExact.structure;
        if (matchExact.designation) document.getElementById('designation').value = matchExact.designation;
        if (matchExact.unite) document.getElementById('unite').value = matchExact.unite;
        if (matchExact.prix_unitaire) document.getElementById('prix_unitaire').value = matchExact.prix_unitaire;
        return; // On stoppe ici car on a trouvé la correspondance parfaite
    }

    // 2. RECHERCHE PAR PRÉFIXE (Ton comportement initial de secours)
    // Si le code exact n'existe pas encore, on gère l'héritage de la Structure via le préfixe "X."
    let indexPoint = codeSaisi.indexOf('.');
    if (indexPoint !== -1) {
        let prefixe = codeSaisi.substring(0, indexPoint + 1);
        let correspondancePrefixe = listeBDQE.find(item => item.code_bdqe.startsWith(prefixe));
        if (correspondancePrefixe) {
            document.getElementById('structure').value = correspondancePrefixe.structure;
        }
    }
}


    function enregistrerLigne() {
        let ouvrage = document.getElementById('ouvrage').value.trim();
        let code_bdqe = document.getElementById('code_bdqe').value.trim();
        let structure = document.getElementById('structure').value.trim();
        let designation = document.getElementById('designation').value.trim();
        let unite = document.getElementById('unite').value.trim();
        let rawQ = document.getElementById('quantite').value.trim();
        let rawP = document.getElementById('prix_unitaire').value.trim();

        if (!ouvrage || !code_bdqe || !designation) { alert("Champs obligatoires manquants !"); return; }
        let quantite = rawQ === "" ? null : parseFloat(rawQ.replace(/\s/g, '').replace(',', '.')) || null;
        let prix_unitaire = rawP === "" ? null : parseFloat(rawP.replace(/\s/g, '').replace(',', '.')) || null;
        let total = (quantite !== null && prix_unitaire !== null) ? quantite * prix_unitaire : null;

        let donneeLigne = { ouvrage, code_bdqe, structure, designation, unite, quantite, prix_unitaire, total };
        let editIndex = parseInt(document.getElementById('editIndex').value);
        if (editIndex === -1) { listeBDQE.push(donneeLigne); } else { listeBDQE[editIndex] = donneeLigne; }
        rechargerTout(); reinitialiserFormulaire();
    }

    function rechargerTout() { trierDonnees(); genererSegments(); afficherTableauPrincipal(); calculerRecapitulatifs(); actualiserSuggestionsOuvrages(); localStorage.setItem(cleStockageBDQE, JSON.stringify(listeBDQE)); }
    function reinitialiserFormulaire() { document.getElementById('ouvrage').value = ""; document.getElementById('code_bdqe').value = ""; document.getElementById('structure').value = ""; document.getElementById('designation').value = ""; document.getElementById('unite').value = ""; document.getElementById('quantite').value = ""; document.getElementById('prix_unitaire').value = ""; document.getElementById('editIndex').value = "-1"; document.getElementById('btnEnregistrer').innerText = "Valider"; }
    function actualiserSuggestionsOuvrages() { let uniqueOuvrages = [...new Set(listeBDQE.map(item => item.ouvrage).filter(Boolean))]; let datalist = document.getElementById('listeSuggestionsOuvrages'); datalist.innerHTML = ""; uniqueOuvrages.forEach(ouv => { let option = document.createElement('option'); option.value = ouv; datalist.appendChild(option); }); }
</script>
<script>
       // --- L'IMPORTATEUR SÉCURISÉ : AUCUN DÉCALAGE AVEC LES VIRGULES DE PONCTUATION ---
        // --- L'IMPORTATEUR REPARÉ ET SÉCURISÉ ---
    function importerFichierCsvAnticrash(input) {
        if (!input.files || input.files.length === 0) return;
        let leFichier = input.files[0]; // Correction du pointeur sur le fichier
        let reader = new FileReader();
        
        reader.onload = function(e) {
            try {
                let texteBrut = e.target.result;
                let chargees = [];
                
                let lignesCalculees = [];
                let dansGuillemetsGlobal = false;
                let ligneCourante = "";
                
                // 1. Découpage des lignes en gérant les retours à la ligne internes d'Excel
                for (let i = 0; i < texteBrut.length; i++) {
                    let char = texteBrut[i];
                    if (char === '"') {
                        dansGuillemetsGlobal = !dansGuillemetsGlobal;
                        ligneCourante += char;
                    } else if ((char === '\n' || char === '\r') && !dansGuillemetsGlobal) {
                        if (char === '\n' || (char === '\r' && texteBrut[i+1] !== '\n')) {
                            if (ligneCourante.trim()) lignesCalculees.push(ligneCourante.trim());
                            ligneCourante = "";
                        }
                    } else {
                        ligneCourante += char;
                    }
                }
                if (ligneCourante.trim()) lignesCalculees.push(ligneCourante.trim());

                // REPARÉ : Détection dynamique du séparateur sur la première ligne de texte
                let sep = ';';
                if (lignesCalculees.length > 0) {
                    let premiereLigne = lignesCalculees[0];
                    if (!premiereLigne.includes(';') && premiereLigne.includes(',')) {
                        sep = ',';
                    }
                }

                // 2. Traitement ligne par ligne
                for(let i = 1; i < lignesCalculees.length; i++) {
                    let line = lignesCalculees[i];
                    
                    let cellules = [];
                    let dansGuillemets = false;
                    let celluleCourante = "";
                    
                    // On extrait les colonnes en ignorant les séparateurs dans les guillemets
                    for (let c = 0; c < line.length; c++) {
                        let char = line[c];
                        if (char === '"') { 
                            dansGuillemets = !dansGuillemets; 
                        } else if (char === sep && !dansGuillemets) {
                            cellules.push(celluleCourante.trim());
                            celluleCourante = "";
                        } else { 
                            celluleCourante += char; 
                        }
                    }
                    cellules.push(celluleCourante.trim());
                    
                    if(cellules.length < 5) continue;
                    
                    let clean = cellules.map(cell => cell.replace(/^"|"$/g, '').trim());
                    
                    // ALIGNEMENT STRICT DE TES COLONNES EXCEL (A à G)
                    let ouv = clean[0] || "Non spécifié";
                    let code = clean[1] || "";
                    let struct = clean[2] || "";
                    let des = clean[3] || "";
                    let uni = clean[4] || "";
                    let qRaw = clean[5] || "";
                    let pRaw = clean[6] || "";
                    
                    let q = qRaw === "" ? null : parseFloat(qRaw.replace(/\s/g, '').replace(',', '.')) || null;
                    let p = pRaw === "" ? null : parseFloat(pRaw.replace(/\s/g, '').replace('Ar', '').replace(/\s/g, '').replace(',', '.')) || null;
                    if(isNaN(q)) q = null; if(isNaN(p)) p = null;
                    
                    chargees.push({ 
                        ouvrage: ouv, code_bdqe: code, structure: struct, designation: des, 
                        unite: uni, quantite: q, prix_unitaire: p, total: (q !== null && p !== null ? q * p : null) 
                    });
                }
                
                if (chargees.length > 0) {
                    listeBDQE = [...chargees];
                    rechargerTout();
                    alert("🎉 Succès total ! Les " + chargees.length + " lignes ont été importées. Toutes les phrases contenant des virgules sont désormais parfaitement alignées !");
                } else { 
                    alert("⚠️ Aucun élément valide détecté."); 
                }
            } catch (err) { 
                alert("Erreur lors de l'analyse du fichier."); 
                console.error(err); 
            }
            input.value = "";
        };
        reader.readAsText(leFichier, 'UTF-8');
    }


    // --- TON CODE D'EXPORTATION PARFAIT ---
    function exporterBordereauExcel() {
        let corpsTableau = document.getElementById('tbodyBDQE');
        let tableau = corpsTableau ? corpsTableau.closest('table') : document.querySelector('table');
        if (!tableau || listeBDQE.length === 0) return alert("Tableau vide.");

        let lignesCsv = [];
        let lignesTableau = tableau.querySelectorAll('tr');
        
        lignesTableau.forEach(row => {
            let cellules = row.querySelectorAll('th, td');
            let donneesLigne = [];
            for (let i = 0; i < cellules.length; i++) {
                if (i === cellules.length - 1 && (cellules[i].innerHTML.includes('button') || cellules[i].innerHTML.includes('✏️'))) continue;
                let texteCellule = cellules[i].innerText.trim().replace(/\n/g, " ").replace(/"/g, '""');
                if (i >= 5 && texteCellule !== "") { texteCellule = texteCellule.replace(' Ar', '').replace(/\s/g, '').replace('.', ','); }
                donneesLigne.push('"' + texteCellule + '"');
            }
            if (donneesLigne.length > 0) lignesCsv.push(donneesLigne.join(";"));
        });

        let csvContent = lignesCsv.join("\n");
        let blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
        let lien = document.createElement("a"); lien.href = URL.createObjectURL(blob); lien.setAttribute("download", "Export_BDQE.csv");
        document.body.appendChild(lien); lien.click(); document.body.removeChild(lien);
    }

    function afficherTableauPrincipal() {
        let tbody = document.getElementById('tbodyBDQE'); tbody.innerHTML = "";
        listeBDQE.forEach((item, index) => {
            if (filtreOuvrageActif !== "TOUS" && item.ouvrage !== filtreOuvrageActif) return;
            if (filtreStructureActif !== "TOUS" && item.structure !== filtreStructureActif) return;
            let tr = document.createElement('tr');
            tr.innerHTML = `<td><b>${item.ouvrage}</b></td><td>${item.code_bdqe}</td><td>${item.structure}</td><td>${item.designation}</td><td>${item.unite}</td><td>${item.quantite !== null ? item.quantite.toLocaleString('fr-FR') : ''}</td><td>${item.prix_unitaire !== null ? formatArgent(item.prix_unitaire)+' Ar' : ''}</td><td><b>${item.total !== null ? formatArgent(item.total)+' Ar' : ''}</b></td><td><button class="btn btn-primary" style="padding:4px 8px; font-size:12px;" onclick="preparerModification(${index})">✏️</button> <button class="btn btn-danger" style="padding:4px 8px; font-size:12px;" onclick="supprimerLigne(${index})">🗑️</button></td>`;
            tbody.appendChild(tr);
        });
    }

    function preparerModification(index) { let item = listeBDQE[index]; document.getElementById('ouvrage').value = item.ouvrage; document.getElementById('code_bdqe').value = item.code_bdqe; document.getElementById('structure').value = item.structure; document.getElementById('designation').value = item.designation; document.getElementById('unite').value = item.unite; document.getElementById('quantite').value = item.quantite !== null ? item.quantite : ""; document.getElementById('prix_unitaire').value = item.prix_unitaire !== null ? item.prix_unitaire : ""; document.getElementById('editIndex').value = index; document.getElementById('btnEnregistrer').innerText = "Modifier ✏️"; }
    function supprimerLigne(index) { if(confirm("Supprimer ?")) { listeBDQE.splice(index, 1); rechargerTout(); } }
    function genererSegments() {
        let uniqueOuvrages = ["TOUS", ...new Set(listeBDQE.map(item => item.ouvrage).filter(Boolean))];
        let uniqueStructures = ["TOUS", ...new Set(listeBDQE.map(item => item.structure).filter(Boolean))];
        let containerOuvrage = document.getElementById('segmentOuvrages'); containerOuvrage.innerHTML = "";
        uniqueOuvrages.forEach(ouv => { let btn = document.createElement('button'); btn.className = `segment-btn ${filtreOuvrageActif === ouv ? 'active' : ''}`; btn.innerText = ouv; btn.onclick = () => { filtreOuvrageActif = ouv; rechargerTout(); }; containerOuvrage.appendChild(btn); });
        let containerStructure = document.getElementById('segmentStructures'); containerStructure.innerHTML = "";
        uniqueStructures.forEach(str => { let btn = document.createElement('button'); btn.className = `segment-btn ${filtreStructureActif === str ? 'active' : ''}`; btn.innerText = str; btn.onclick = () => { filtreStructureActif = str; rechargerTout(); }; containerStructure.appendChild(btn); });
    }
    function calculerRecapitulatifs() {
        let totauxParOuvrage = {}; let global = 0;
        listeBDQE.forEach(item => { if (item.total !== null) { global += item.total; if (!totauxParOuvrage[item.ouvrage]) totauxParOuvrage[item.ouvrage] = 0; totauxParOuvrage[item.ouvrage] += item.total; } });
        let tbodyRecap = document.getElementById('tbodyRecapOuvrage'); tbodyRecap.innerHTML = "";
        for (let ouv in totauxParOuvrage) { let tr = document.createElement('tr'); tr.innerHTML = `<td>${ouv}</td><td><b>${formatArgent(totauxParOuvrage[ouv])} Ar</b></td>`; tbodyRecap.appendChild(tr); }
        document.getElementById('totalGlobal').innerText = `Total Global du Projet : ${formatArgent(global)} Ar`;
    }
    function nettoyerToutBDQE() { if (confirm("⚠️ Effacer tout ?")) { listeBDQE = []; localStorage.removeItem(cleStockageBDQE); rechargerTout(); reinitialiserFormulaire(); } }
</script>
</body>
</html>
