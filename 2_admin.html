<!DOCTYPE html>
<html lang="fr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Génie Civil Pro - Administration Avancée</title>
 <style>
 :root {
 --primary-dark: #0f172a;
 --sidebar-bg: #1e293b;
 --accent-blue: #2563eb;
 --accent-amber: #d97706;
 --success-green: #16a34a;
 --danger-red: #ef4444;
 --bg-light: #f1f5f9;
 --text-dark: #334155;
 --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
 }
 body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-light); color: var(--text-dark); margin: 0; padding: 15px; height: 100vh; overflow: hidden; box-sizing: border-box; }
 .admin-main-layout { display: grid; grid-template-columns: 310px 1fr; height: calc(100vh - 75px); gap: 15px; margin-top: 10px; }
 .admin-sidebar-select { background: var(--sidebar-bg); color: #f1f5f9; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; overflow-y: auto; box-sizing: border-box; }
 .admin-header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 20px; border-radius: 8px; box-shadow: var(--card-shadow); border-left: 4px solid var(--primary-dark); height: 50px; box-sizing: border-box; }
 .admin-header h1 { margin: 0; font-size: 18px; color: var(--primary-dark); font-weight: 900; text-transform: uppercase; }
 .btn { padding: 6px 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; font-size: 11px; transition: background 0.2s; display: inline-flex; align-items: center; gap: 5px; text-transform: uppercase; }
 .btn-primary { background-color: var(--accent-blue); }
 .btn-success { background-color: var(--success-green); }
 .btn-danger { background-color: var(--danger-red); }
 .btn-secondary { background-color: #64748b; }
 .layout-grid-workspace { display: flex; flex-direction: column; gap: 15px; overflow-y: auto; height: 100%; padding-right: 5px; box-sizing: border-box; }
 .grid-two-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex-shrink: 0; }
 .admin-card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; box-shadow: var(--card-shadow); display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; }
 .card-title { font-size: 12px; font-weight: bold; text-transform: uppercase; color: var(--primary-dark); border-bottom: 2px solid #e2e8f0; padding-bottom: 4px; margin-bottom: 2px; letter-spacing: 0.5px; }
 .form-group { display: flex; flex-direction: column; gap: 3px; }
 .form-group label { font-size: 11px; font-weight: bold; color: #475569; text-transform: uppercase; }
 .input-control { width: 100%; padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; outline: none; box-sizing: border-box; }
 .proj-node { padding: 8px; border-radius: 4px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; color: #cbd5e1; }
 .proj-node:hover { background: #334155; color: white; }
 .proj-node.selected { background: var(--accent-blue); color: white; font-weight: bold; }
 .proj-node-child { margin-left: 15px; border-left: 1px dashed #475569; padding-left: 8px; }
 .proj-node-child.hidden { display: none; }
 .arrow-toggle { font-size: 9px; padding: 2px 6px; background: #334155; border-radius: 4px; cursor: pointer; color: white; }
 .rbac-tree-wrapper { background: #f8fafc; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1; max-height: 140px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
 .logo-upload-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
 .logo-upload-box { border: 1px dashed #cbd5e1; padding: 6px; border-radius: 6px; background: #f8fafc; text-align: center; font-size: 10px; min-height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
 .scrolling-table-wrapper { max-height: 130px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 6px; width: 100%; }
 table { width: 100%; border-collapse: collapse; }
 th, td { border: 1px solid #e5e7eb; padding: 6px 8px; text-align: left; font-size: 11px; vertical-align: middle; }
 th { background-color: var(--primary-dark); color: white; position: sticky; top: 0; z-index: 10; }
 tr:nth-child(even) { background-color: #f9fafb; }
 .badge-role { padding: 2px 5px; border-radius: 4px; font-weight: bold; font-size: 9px; text-transform: uppercase; }
 </style>
</head>
<body>
<script>
    if (localStorage.getItem("session_securisee_active_gc") !== "VALIDE") {
        window.location.replace("1_login.html");
    }
</script>
<div class="admin-container" style="height: 100%; display: flex; flex-direction: column;">
 <div class="admin-header">
 <div>
 <h1> Bureau d'Administration Centrale</h1>
 <div style="font-size:12px; color:#64748b;">Pilotage de l'arbre des projets et étanchéité absolue</div>
 </div>
 <button class="btn btn-secondary" onclick="window.location.href='3_accueil.html'">« Accéder à l'Accueil</button>
 </div>
 <div class="admin-main-layout">
 <div class="admin-sidebar-select">
 <div style="font-size:11px; font-weight:bold; text-transform:uppercase; color:#94a3b8; margin-bottom:8px;">Sélectionner le Projet</div>
 <div id="accordeonProjetsAdmin" style="flex-grow:1; display:flex; flex-direction:column; gap:2px;"></div>
 </div>
 <div class="layout-grid-workspace">
 <div class="grid-two-cols">
 <div class="admin-card">
 <div class="card-title" id="titreCharteActive">I. Charte Contractuelle</div>
 <div class="form-group"><label>Objet Global / Nom du Lot</label><input type="text" id="cfgObjet" class="input-control"></div>
 <div class="form-group"><label>Financement</label><input type="text" id="cfgFinancement" class="input-control"></div>
 <div class="form-group"><label>Maître d'Ouvrage (MO)</label><input type="text" id="cfgMO" class="input-control"></div>
 <div class="form-group"><label>Maître d'Œuvre (MOE)</label><input type="text" id="cfgMOE" class="input-control"></div>
 <div class="form-group"><label>Entreprise Titulaire</label><input type="text" id="cfgEnterprise" class="input-control"></div>
 <div class="form-group"><label>Numéro de Contrat</label><input type="text" id="cfgNumContrat" class="input-control"></div>
 <div class="logo-upload-grid" style="margin-top: 5px;">
 <div class="logo-upload-box"><label id="btnUploadMO" style="cursor:pointer;color:var(--accent-blue);">MO<input type="file" style="display:none" onchange="convertirLogoBinaire(this, 'logoMO')"></label><div id="preview_logoMO"></div></div>
 <div class="logo-upload-box"><label id="btnUploadFin" style="cursor:pointer;color:var(--accent-blue);">Bailleur<input type="file" style="display:none" onchange="convertirLogoBinaire(this, 'logoFin')"></label><div id="preview_logoFin"></div></div>
 <div class="logo-upload-box"><label id="btnUploadMOE" style="cursor:pointer;color:var(--accent-blue);">MOE<input type="file" style="display:none" onchange="convertirLogoBinaire(this, 'logoMOE')"></label><div id="preview_logoMOE"></div></div>
 <div class="logo-upload-box"><label id="btnUploadEnt" style="cursor:pointer;color:var(--accent-blue);">Ent.<input type="file" style="display:none" onchange="convertirLogoBinaire(this, 'logoEntreprise')"></label><div id="preview_logoEntreprise"></div></div>
 </div>
 <button class="btn btn-success" style="justify-content:center; margin-top: 5px;" onclick="sauvegarderDonneesProjetSelectionne()">Enregistrer la Charte</button>
 </div>
 <div class="admin-card">
 <div class="card-title">II. Structure de l'Arbre des Lots</div>
 <input type="hidden" id="editProjetId" value="">
 <div class="form-group"><label>Désignation du Lot</label><input type="text" id="projNom" class="input-control"></div>
 <div class="form-group">
 <label>Classification</label>
 <select id="projType" class="input-control" onchange="gererAffichageSelectParent()">
 <option value="PAPA">Projet Père</option>
 <option value="ENFANT">↳ Projet Enfant</option>
 <option value="CLASSIQUE">Projet Classique (Chantier Autonome Isolé)</option>
 </select>
 </div>
 <div class="form-group" id="rowSelectParent" style="display:none;"><label>Rattachement Hiérarchique</label><select id="projParentId" class="input-control"></select></div>
 <button class="btn btn-primary" id="btnSaveProjet" onclick="enregistrerOuModifierProjetFerme()">Valider</button>
 <div class="scrolling-table-wrapper" style="margin-top:10px;">
 <table><thead><tr><th>Désignation</th><th>Type</th><th>Actions</th></tr></thead><tbody id="tbodyProjetsAdminList"></tbody></table>
 </div>
 </div>
 </div>
 <div class="admin-card" style="flex-shrink:0; padding-bottom: 20px;">
 <div class="card-title">III. Matrice de Sécurité Privilèges Agents</div>
 <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px;">
 <div class="form-group"><label>Identifiant</label><input type="text" id="usrLogin" class="input-control"></div>
 <div class="form-group"><label>Mot de passe</label><input type="text" id="usrPass" class="input-control"></div>
 <div class="form-group"><label>Rôle</label><select id="usrRole" class="input-control"><option value="cadres">Cadre</option><option value="controle">Ingénieur Contrôle</option><option value="agents">Agent Terrain</option></select></div>
 </div>
 <div class="form-group" style="margin-top:5px;">
 <label style="display:flex; justify-content:space-between; align-items:center;">
 <span style="color:var(--accent-blue); font-weight:bold;">Assignation des Lots</span>
 <div style="display:flex; gap:5px;"><input type="text" id="searchFilterLots" class="input-control" placeholder="Filtrer..." style="width:100px; padding:2px;" oninput="filtrerArbreCheckboxesLots()"><button class="btn btn-secondary" style="padding:2px 5px;" onclick="basculerToutCocherLots(true)">Tout cocher</button></div>
 </label>
 <div class="rbac-tree-wrapper" id="boxCheckboxesLotsAssignes"></div>
 </div>
 <button class="btn btn-primary" style="float:right; margin-top:5px;" onclick="ajouterNouvelUtilisateurRbac()">Enregistrer l'Agent</button>
 <div class="scrolling-table-wrapper" style="margin-top:35px; max-height:120px;">
 <table><thead><tr><th>Identifiant</th><th>Rôle</th><th>Lots</th><th>Actions</th></tr></thead><tbody id="tbodyUsersAdmin"></tbody></table>
 </div>
 </div>
 </div>
 </div>
</div>
<script>
 let listeProjetsGlobal = [];
 let listeUtilisateursRBAC = [];
 let idProjetSelectionneAdmin = 101;
 let etatsAccordéonAdmin = {}; 
 let etatsAccordéonMatrixAssign = {}; 
 window.onload = function() { chargerArbreProjetsEtUtilisateurs(); }
 function chargerArbreProjetsEtUtilisateurs() {
 let ProjsSauves = localStorage.getItem("classeur_maitre_projets_lee");
 listeProjetsGlobal = ProjsSauves ? JSON.parse(ProjsSauves) : [
 { id: 101, nom: "MARCHE CENTRAL 52 ECOLES", type: "PAPA", parentId: null },
 { id: 102, nom: "Lot 1 - Arrondissement 4", type: "ENFANT", parentId: 101 },
 { id: 103, nom: "Lot 2 - Arrondissement 5", type: "ENFANT", parentId: 101 }
 ];
 if(!ProjsSauves) localStorage.setItem("classeur_maitre_projets_lee", JSON.stringify(listeProjetsGlobal));
 listeProjetsGlobal.forEach(p => { if(p.type === 'PAPA') { etatsAccordéonAdmin[p.id] = true; etatsAccordéonMatrixAssign[p.id] = true; } });
 
 // Récupération stricte de ta base
 let usersSauves = localStorage.getItem("matrice_utilisateurs_rbac_gc");
 listeUtilisateursRBAC = usersSauves ? JSON.parse(usersSauves) : [{ id: 1, login: "admin", pass: "mada2026", role: "admin", lots: ["101", "102", "103"] }];
 
 // ON DESSINE D'ABORD LES COMPTES AGENTS POUR SÉCURISER L'AFFICHAGE
 afficherTableauUtilisateurs();
 renderAccordéonSidebarSelection(); 
 afficherTableauProjets(); 
 genererCheckboxesLotsArbreAccordéon(); 
 gererAffichageSelectParent(); 
 
 // On charge la charte contractuelle à la toute fin
 try {
     basculerDonneesVersProjetSelectionne(idProjetSelectionneAdmin);
 } catch(e) {
     console.warn("Erreur d'initialisation de la charte :", e.message);
 }
}

 function renderAccordéonSidebarSelection() {
 let container = document.getElementById('accordeonProjetsAdmin'); if(!container) return; container.innerHTML = "";
 listeProjetsGlobal.filter(p => p.type === 'PAPA').forEach(r => {
 let divP = document.createElement('div'); divP.className = `proj-node ${idProjetSelectionneAdmin == r.id ? 'selected' : ''}`;
 divP.innerHTML = `<span>${r.nom}</span><span class="arrow-toggle" onclick="toggleDossierAdmin(${r.id}, event)">${etatsAccordéonAdmin[r.id]?'▼':'▲'}</span>`;
 divP.onclick = function() { selectionnerProjetEnLigneAdmin(r.id); }; container.appendChild(divP);
 if (etatsAccordéonAdmin[r.id]) {
 listeProjetsGlobal.filter(p => p.type === 'ENFANT' && p.parentId == r.id).forEach(e => {
 let divE = document.createElement('div'); divE.className = `proj-node proj-node-child ${idProjetSelectionneAdmin == e.id ? 'selected' : ''}`;
 divE.innerHTML = `<span>${e.nom}</span>`; divE.onclick = function(event) { event.stopPropagation(); selectionnerProjetEnLigneAdmin(e.id); }; container.appendChild(divE);
 });
 }
 });
 }
 function toggleDossierAdmin(pId, ev) { ev.stopPropagation(); etatsAccordéonAdmin[pId] = !etatsAccordéonAdmin[pId]; renderAccordéonSidebarSelection(); }
 function selectionnerProjetEnLigneAdmin(id) { idProjetSelectionneAdmin = id; renderAccordéonSidebarSelection(); basculerDonneesVersProjetSelectionne(id); }
 function basculerDonneesVersProjetSelectionne(id) {
    let p = listeProjetsGlobal.find(i => i.id == id); if(!p) return;
    document.getElementById('titreCharteActive').innerText = `I. Charte Contractuelle (Lot : ${p.nom.toUpperCase()})`;
    document.getElementById('cfgObjet').value = p.nom || "";
    
    let charteSpecifique = localStorage.getItem(`charte_administrative_${id}`);
    let d = charteSpecifique ? JSON.parse(charteSpecifique) : {};
    let m = {};
    
    // Système d'héritage automatique : si c'est un enfant, on cherche la charte du père
    if (p.type === 'ENFANT' && p.parentId) {
        let parentSauve = localStorage.getItem(`charte_administrative_${p.parentId}`);
        if (parentSauve) m = JSON.parse(parentSauve);
    }
    
    document.getElementById('cfgFinancement').value = d.financement || m.financement || "";
    document.getElementById('cfgMO').value = d.mo || m.mo || "";
    document.getElementById('cfgMOE').value = d.moe || m.moe || "";
    document.getElementById('cfgEnterprise').value = d.entreprise || m.entreprise || "";
    document.getElementById('cfgNumContrat').value = d.numContrat || m.numContrat || "";
    
    // Les boutons d'upload ne s'affichent que sur le Projet Père (PAPA) ou Classique
    let displayUploader = p.type === 'ENFANT' ? 'none' : 'inline-flex';
    document.getElementById('btnUploadMO').style.display = displayUploader;
    document.getElementById('btnUploadFin').style.display = displayUploader;
    document.getElementById('btnUploadMOE').style.display = displayUploader;
    document.getElementById('btnUploadEnt').style.display = displayUploader;
    
    // Sélection de la source des logos (Héritée si Enfant, Propre si Père)
    let sourceLogos = p.type === 'ENFANT' ? m : d;
    document.getElementById('preview_logoMO').innerHTML = sourceLogos.logoMO_html || "";
    document.getElementById('preview_logoFin').innerHTML = sourceLogos.logoFin_html || "";
    document.getElementById('preview_logoMOE').innerHTML = sourceLogos.logoMOE_html || "";
    document.getElementById('preview_logoEntreprise').innerHTML = sourceLogos.logoEntreprise_html || "";
}

function sauvegarderDonneesProjetSelectionne() {
    let nomSaisi = document.getElementById('cfgObjet').value.trim();
    if(!nomSaisi) return alert("Désignation manquante !");
    
    let p = listeProjetsGlobal.find(i => i.id == idProjetSelectionneAdmin);
    if(p) { 
        p.nom = nomSaisi; 
        localStorage.setItem("classeur_maitre_projets_lee", JSON.stringify(listeProjetsGlobal)); 
    }
    
    let charteData = {
        financement: document.getElementById('cfgFinancement').value.trim(),
        mo: document.getElementById('cfgMO').value.trim(), 
        moe: document.getElementById('cfgMOE').value.trim(), 
        entreprise: document.getElementById('cfgEnterprise').value.trim(), 
        numContrat: document.getElementById('cfgNumContrat').value.trim(),
        logoMO_html: document.getElementById('preview_logoMO').innerHTML, 
        logoFin_html: document.getElementById('preview_logoFin').innerHTML, 
        logoMOE_html: document.getElementById('preview_logoMOE').innerHTML, 
        logoEntreprise_html: document.getElementById('preview_logoEntreprise').innerHTML
    };
    
    localStorage.setItem(`charte_administrative_${idProjetSelectionneAdmin}`, JSON.stringify(charteData));
    
    // Si c'est le projet maître historique, on met à jour la fiche globale
    if (idProjetSelectionneAdmin == 101) {
        localStorage.setItem("base_donnees_fiche_projet_maitre", JSON.stringify({ 
            objet: nomSaisi, financement: charteData.financement, mo: charteData.mo, 
            moe: charteData.moe, entreprise: charteData.entreprise, numContrat: charteData.numContrat, 
            logoMO_html: charteData.logoMO_html, logoFin_html: charteData.logoFin_html, 
            logoMOE_html: charteData.logoMOE_html, logoEntreprise_html: charteData.logoEntreprise_html 
        }));
    }
    alert("✅ Paramètres et logos contractuels enregistrés.");
    chargerArbreProjetsEtUtilisateurs();
}

 function genererCheckboxesLotsArbreAccordéon() {
 let box = document.getElementById('boxCheckboxesLotsAssignes'); if(!box) return; box.innerHTML = "";
 listeProjetsGlobal.filter(p => p.type === 'PAPA').forEach(r => {
 let divP = document.createElement('div'); divP.style.cssText = "display:flex; align-items:center; justify-content:space-between; background:#f1f5f9; padding:4px;";
 divP.innerHTML = `<label><input type="checkbox" name="assignationLot" value="${r.id}"> ${r.nom}</label>`; box.appendChild(divP);
 listeProjetsGlobal.filter(p => p.type === 'ENFANT' && p.parentId == r.id).forEach(e => {
 let divE = document.createElement('div'); divE.style.cssText = "margin-left:15px;";
 divE.innerHTML = `<label><input type="checkbox" name="assignationLot" value="${e.id}"> ${e.nom}</label>`; box.appendChild(divE);
 });
 });
 }
 function basculerToutCocherLots(statut) { document.querySelectorAll('#boxCheckboxesLotsAssignes input[type="checkbox"]').forEach(cb => cb.checked = statut); }
 function filtrerArbreCheckboxesLots() { let motCle = document.getElementById('searchFilterLots').value.toLowerCase().trim(); document.querySelectorAll('#boxCheckboxesLotsAssignes div').forEach(lbl => { lbl.style.display = !motCle || lbl.innerText.toLowerCase().includes(motCle) ? "flex" : "none"; }); }
 function gererAffichageSelectParent() { let type = document.getElementById('projType').value; let row = document.getElementById('rowSelectParent'); if(type === 'ENFANT') { row.style.display = 'flex'; let select = document.getElementById('projParentId'); select.innerHTML = ""; listeProjetsGlobal.filter(p => p.type === 'PAPA').forEach(p => { select.innerHTML += `<option value="${p.id}">${p.nom}</option>`; }); } else { row.style.display = 'none'; } }
 function afficherTableauProjets() { 
    let tbody = document.getElementById('tbodyProjetsAdminList'); if(!tbody) return; 
    tbody.innerHTML = ""; 
    listeProjetsGlobal.forEach(p => { 
        let tr = document.createElement('tr'); 
        let txtType = p.type === 'PAPA' ? 'Père' : p.type === 'ENFANT' ? 'Enfant' : 'Classique'; 
        tr.innerHTML = `<td><b>${p.nom}</b></td><td>${txtType}</td><td><button class="btn btn-danger" onclick="supprimerProjetFerme(${p.id})">❌</button></td>`; 
        tbody.appendChild(tr); 
    }); 
}

 function enregistrerOuModifierProjetFerme() { let nom = document.getElementById('projNom').value.trim(); let type = document.getElementById('projType').value; let parentId = type === 'ENFANT' ? parseInt(document.getElementById('projParentId').value) : null; if(!nom) return alert("Désignation manquante"); listeProjetsGlobal.push({ id: Date.now(), nom, type, parentId }); localStorage.setItem("classeur_maitre_projets_lee", JSON.stringify(listeProjetsGlobal)); document.getElementById('projNom').value = ""; chargerArbreProjetsEtUtilisateurs(); }
 function supprimerProjetFerme(id) { if(confirm("Supprimer ?")) { listeProjetsGlobal = listeProjetsGlobal.filter(p => p.id !== id); localStorage.setItem("classeur_maitre_projets_lee", JSON.stringify(listeProjetsGlobal)); chargerArbreProjetsEtUtilisateurs(); } }
 function ajouterNouvelUtilisateurRbac() { let login = document.getElementById('usrLogin').value.trim(); let pass = document.getElementById('usrPass').value.trim(); let role = document.getElementById('usrRole').value; let checkboxes = document.querySelectorAll('input[name="assignationLot"]:checked'); let lots = []; checkboxes.forEach(cb => lots.push(cb.value)); if(!login || !pass || lots.length === 0) return alert("Remplissez tout !"); listeUtilisateursRBAC.push({ id: Date.now(), login, pass, role, lots }); localStorage.setItem("matrice_utilisateurs_rbac_gc", JSON.stringify(listeUtilisateursRBAC)); document.getElementById('usrLogin').value = ""; document.getElementById('usrPass').value = ""; document.querySelectorAll('input[name="assignationLot"]:checked').forEach(cb => cb.checked = false); afficherTableauUtilisateurs(); }
 function afficherTableauUtilisateurs() { let tbody = document.getElementById('tbodyUsersAdmin'); if(!tbody) return; tbody.innerHTML = ""; listeUtilisateursRBAC.forEach(u => { let btn = u.login === 'admin' ? '<i>Maitre</i>' : `<button class="btn btn-danger" onclick="supprimerUser(${u.id})">❌</button>`; tbody.innerHTML += `<tr><td><b>${u.login}</b></td><td><span class="badge-role">${u.role}</span></td><td>${u.lots.join(", ")}</td><td>${btn}</td></tr>`; }); }
 function supprimerUser(id) { if(confirm("Supprimer ?")) { listeUtilisateursRBAC = listeUtilisateursRBAC.filter(u => u.id !== id); localStorage.setItem("matrice_utilisateurs_rbac_gc", JSON.stringify(listeUtilisateursRBAC)); afficherTableauUtilisateurs(); } }
 function convertirLogoBinaire(input, cibleId) { if (input.files && input.files) { let reader = new FileReader(); reader.onload = function(e) { document.getElementById(`preview_${cibleId}`).innerHTML = `<img src="${e.target.result}" style="max-height:20px;">`; }; reader.readAsDataURL(input.files); } }
</script>
</body>
</html>
