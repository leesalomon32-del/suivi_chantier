<!DOCTYPE html>
<html lang="fr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Génie Civil Pro - Procès-Verbal de Chantier Isolé</title>
 <style>
 :root {
 --primary-color: #0f172a;
 --secondary-color: #3b82f6;
 --success-color: #16a34a;
 --bg-color: #f8fafc;
 --text-color: #111827;
 --cbd5e1: #cbd5e1;
 }
 body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
 .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
 .top-navbar { display: flex; justify-content: space-between; align-items: center; background: #0f172a; color: white; padding: 15px 20px; border-radius: 6px; margin-bottom: 25px; }
 .top-navbar-title { font-weight: bold; font-size: 16px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
 .nav-buttons { display: flex; gap: 10px; }
 .btn { padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; display: inline-flex; align-items: center; gap: 5px; font-size: 13px; text-transform: uppercase; }
 .btn-success { background-color: var(--success-color); }
 .btn-primary { background-color: var(--secondary-color); }
 .btn-secondary { background-color: #64748b; }
 .entete-master { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
 .entete-master td { border: 1px solid #cbd5e1; padding: 8px 12px; font-size: 12px; vertical-align: middle; }
 .lbl-gray { background-color: #f8fafc; font-weight: bold; width: 150px; color: #334155; }
 .pv-titre-cadre { text-align: center; border-top: 2px solid #1e3a8a; border-bottom: 2px solid #1e3a8a; padding: 10px 0; margin-bottom: 25px; }
 .pv-titre-input { width: 90%; border: none; font-size: 16px; font-weight: bold; color: #1e3a8a; text-align: center; text-transform: uppercase; outline: none; background: transparent; }
 .meta-saisie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; background: #f8fafc; padding: 12px; border-radius: 4px; border: 1px solid #e2e8f0; }
 .field-row { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: bold; }
 .field-row input { padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 4px; flex-grow: 1; font-size: 13px; outline: none; }
 .table-constats { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
 .table-constats th { background-color: #0f172a; color: white; padding: 10px; font-size: 12px; text-align: left; }
 .table-constats td { border: 1px solid #cbd5e1; padding: 8px; font-size: 13px; vertical-align: top; }
 .textarea-cell { width: 100%; border: none; resize: none; font-family: inherit; font-size: 13px; outline: none; min-height: 40px; box-sizing: border-box; }
 .signatures-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
 .signature-card { border: 1px dashed #cbd5e1; padding: 12px; text-align: center; border-radius: 4px; position: relative; background: #f8fafc; }
 .signature-title-input { width: 90%; border: none; background: transparent; text-align: center; font-weight: bold; font-size: 13px; outline: none; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; margin-bottom: 45px; resize: none; overflow: hidden; }
 .btn-del-sig { position: absolute; top: 2px; right: 2px; cursor: pointer; color: #ef4444; font-weight: bold; font-size: 14px; background: none; border: none; }
 @media print {
 body { padding: 0; background: white; }
 .container { box-shadow: none; padding: 0; max-width: 100%; }
 .top-navbar, .btn, .btn-del-sig, input[type="file"], #formActionsPV { display: none !important; }
 input, textarea { border: none !important; background: transparent !important; resize: none !important; }
 .signature-card { border: none !important; background: transparent !important; }
 tr { page-break-inside: avoid !important; }
 }
 </style>
</head>
<body>
<div class="container">
 <div class="top-navbar">
  <div class="top-navbar-title">📋 Compte-Rendu & Procès-Verbal</div>
  <div class="nav-buttons">
   <button class="btn btn-secondary" onclick="window.location.href='3_accueil.html'">« Retour Accueil</button>
   <button class="btn btn-success" onclick="sauvegarderPVChantier()">💾 Sauvegarder le PV</button>
   <button class="btn btn-primary" onclick="window.print()">Imprimer 🖨️ en PDF</button>
  </div>
 </div>

 <!-- TABLEAU MAITRE RE-ALIGNE CELLULE PAR CELLULE -->
 <table class="entete-master">
  <tr>
   <td class="lbl-gray" style="width: 180px;">Objet du Marché :</td>
   <td id="viewObjet" style="font-weight:bold; color:var(--secondary-color);">-</td>
   <td style="width: 95px; text-align: center; border: 1px solid #cbd5e1; padding: 2px;" id="pvLogoMO"></td>
  </tr>
  <tr>
   <td class="lbl-gray">Bailleur / Financement :</td>
   <td id="viewFinancement">-</td>
   <td style="width: 95px; text-align: center; border: 1px solid #cbd5e1; padding: 2px;" id="pvLogoFin"></td>
  </tr>
  <tr>
   <td class="lbl-gray">Maître d'Ouvrage :</td>
   <td id="viewMO">-</td>
   <td style="width: 95px; text-align: center; border: 1px solid #cbd5e1; padding: 2px;" id="pvLogoMOD"></td>
  </tr>
  <tr>
   <td class="lbl-gray">Maître d'Œuvre :</td>
   <td id="viewMOE">-</td>
   <td style="width: 95px; text-align: center; border: 1px solid #cbd5e1; padding: 2px;" id="pvLogoMOE"></td>
  </tr>
  <tr>
   <td class="lbl-gray">Entreprise Titulaire :</td>
   <td id="viewEntreprise">-</td>
   <td style="width: 95px; text-align: center; border: 1px solid #cbd5e1; padding: 2px;" id="pvLogoEntreprise"></td>
  </tr>
  <tr>
   <td class="lbl-gray">N° de Contrat / Marché :</td>
   <td id="viewNumContrat" style="font-family:monospace; color:var(--secondary-color); font-weight: bold;">-</td>
   <td style="background: #f1f5f9; border: 1px solid #cbd5e1;"></td>
  </tr>
 </table>

 <div class="pv-titre-cadre"><input type="text" id="titrePV" class="pv-titre-input" value="PV DE CONSTATATION DE VISITE DE CHANTIER"></div>
 <div class="meta-saisie-grid">
  <div class="field-row"><label>Date :</label><input type="text" id="dateSaisie" placeholder="Ex: 28/06/2026"></div>
  <div class="field-row"><label>Site :</label><input type="text" id="siteSaisie" placeholder="Ex: CSB II Ambohipo"></div>
 </div>
 <table class="table-constats" id="tableConstatsBody">
  <thead><tr><th style="width: 40px; text-align: center;">N°</th><th style="width: 350px;">Constats</th><th style="width: 350px;">Observations / Recommandations</th><th style="width: 250px;">Photos Illustratives</th></tr></thead>
  <tbody id="tbodyConstats"></tbody>
 </table>
 <div id="formActionsPV" style="margin-bottom: 20px;"><button class="btn btn-primary" onclick="ajouterLigneConstat()">➕ Ajouter une ligne de constat</button></div>
 <div class="signatures-section" id="zoneSignatures"></div>
 <div id="formActionsPV" style="text-align: center; margin-top: 20px;"><button class="btn btn-secondary" onclick="ajouterUnSignataire()">👥 Ajouter un signataire</button></div>
</div>
<script>
const DB_NAME = "GenieCivilPro_DB";
const DB_VERSION = 1;
let dbInstance = null;

function initialiserLeMeubleDB() {
    return new Promise((resolve, reject) => {
        let requete = indexedDB.open(DB_NAME, DB_VERSION);
        requete.onsuccess = function(e) { dbInstance = e.target.result; resolve(dbInstance); };
        requete.onerror = function() { reject("Meuble bloqué."); };
    });
}

function lireDonneeDB(tiroir, cle) {
    return new Promise((resolve) => {
        if(!dbInstance) return resolve(null);
        let tx = dbInstance.transaction([tiroir], "readonly");
        let req = tx.objectStore(tiroir).get(cle);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => resolve(null);
    });
}

function ecrireDonneeDB(tiroir, objet, cleOptionnelle) {
    return new Promise((resolve) => {
        if(!dbInstance) return resolve(false);
        let tx = dbInstance.transaction([tiroir], "readwrite");
        let req = cleOptionnelle !== undefined ? tx.objectStore(tiroir).put(objet, cleOptionnelle) : tx.objectStore(tiroir).put(objet);
        req.onsuccess = () => resolve(true);
        req.onerror = () => resolve(false);
    });
}

let compteurLignes = 0;
let compteurSignataires = 0;
const MAX_SIGNATAIRES = 12;
let idProjetUnique = localStorage.getItem("id_projet_en_cours_de_saisie_temporaire") || "101";
window.onload = function() {
    if (localStorage.getItem("session_securisee_active_gc") !== "VALIDE") {
        window.location.href = "1_login.html"; return;
    }
    document.getElementById('dateSaisie').value = new Date().toLocaleDateString('fr-FR');
    initialiserLeMeubleDB().then(async () => {
        let listeProjetsGlobal = [];
        let tx = dbInstance.transaction(["projets"], "readonly");
        let req = tx.objectStore("projets").getAll();
        req.onsuccess = async function() {
            listeProjetsGlobal = req.result || [];
            let pActuel = listeProjetsGlobal.find(i => i.id == idProjetUnique);
            let n = await lireDonneeDB("dossiers_techniques", `charte_administrative_${idProjetUnique}`) || {};
            let m = {};
            if (pActuel && pActuel.type === 'ENFANT' && pActuel.parentId) {
                m = await lireDonneeDB("dossiers_techniques", `charte_administrative_${pActuel.parentId}`) || {};
            }
            let objetPVText = pActuel ? pActuel.nom.toUpperCase() : "-";
            if (pActuel && pActuel.type === "ENFANT" && pActuel.parentId) {
                let papa = listeProjetsGlobal.find(i => i.id == pActuel.parentId);
                if (papa) objetPVText = `${papa.nom.toUpperCase()} — LOT : ${pActuel.nom.toUpperCase()}`;
            }
            if(document.getElementById('viewObjet')) document.getElementById('viewObjet').innerText = objetPVText;
            if(document.getElementById('viewFinancement')) document.getElementById('viewFinancement').innerText = n.financement || m.financement || "-";
            if(document.getElementById('viewMO')) document.getElementById('viewMO').innerText = n.mo || m.mo || "-";
            if(document.getElementById('viewMOE')) document.getElementById('viewMOE').innerText = n.moe || m.moe || "-";
            let elEnt = document.getElementById('viewEntreprise');
            if(elEnt) elEnt.innerText = n.entreprise || m.entreprise || "-";
            if(document.getElementById('viewNumContrat')) document.getElementById('viewNumContrat').innerText = n.numContrat || m.numContrat || "-";
            
            // Injection millimétrée des 5 logos distincts sans décalage
            let sourceLogos = pActuel && pActuel.type === 'ENFANT' ? m : n;
            let styleStyle = 'style="max-height:35px; max-width:100%; object-fit:contain; vertical-align:middle;"';
            
            if(document.getElementById('pvLogoMO') && sourceLogos.logoMO_html) document.getElementById('pvLogoMO').innerHTML = sourceLogos.logoMO_html.replace('<img', `<img ${styleStyle}`);
            if(document.getElementById('pvLogoFin') && sourceLogos.logoFin_html) document.getElementById('pvLogoFin').innerHTML = sourceLogos.logoFin_html.replace('<img', `<img ${styleStyle}`);
            if(document.getElementById('pvLogoMOD')) document.getElementById('pvLogoMOD').innerHTML = sourceLogos.logoMOD_html || `🏢 <br><span style="font-size:8px;font-weight:bold;color:#64748b;">UGP MEAH</span>`;
            if(document.getElementById('pvLogoMOE') && sourceLogos.logoMOE_html) document.getElementById('pvLogoMOE').innerHTML = sourceLogos.logoMOE_html.replace('<img', `<img ${styleStyle}`);
            if(document.getElementById('pvLogoEntreprise') && sourceLogos.logoEnterprise_html) document.getElementById('pvLogoEntreprise').innerHTML = sourceLogos.logoEnterprise_html.replace('<img', `<img ${styleStyle}`);
            
            if(document.getElementById('siteSaisie') && pActuel) document.getElementById('siteSaisie').value = pActuel.nom.toUpperCase();
        };
        ajouterLigneConstat(); ajouterUnSignataire("Mission de Contrôle\n(MOE)"); ajouterUnSignataire("Entreprise Titulaire\n(Titulaire)");
    });
};

function ajouterLigneConstat() {
    compteurLignes++;
    let tbody = document.getElementById('tbodyConstats');
    let tr = document.createElement('tr'); tr.id = `ligneConstat_${compteurLignes}`;
    tr.innerHTML = `<td style="text-align:center; font-weight:bold; padding-top:12px;">${compteurLignes}</td><td><textarea class="textarea-cell" placeholder="Saisir le constat visuel..." oninput="ajusterHauteurTextarea(this)"></textarea></td><td><textarea class="textarea-cell" placeholder="Directives / Recommandations..." oninput="ajusterHauteurTextarea(this)"></textarea></td><td><input type="file" accept="image/*" id="imgInput_${compteurLignes}" onchange="previsualiserPhotoConstat(${compteurLignes}, this)"><div id="prevBox_${compteurLignes}" style="margin-top:5px; max-width:200px; display:none;"><img id="prevImg_${compteurLignes}" style="width:100%; max-height:120px; object-fit:contain; border-radius:4px; border:1px solid #cbd5e1;"></div></td>`;
    tbody.appendChild(tr);
}

function ajusterHauteurTextarea(element) { element.style.height = "auto"; element.style.height = element.scrollHeight + "px"; }

function previsualiserPhotoConstat(numLigne, input) {
    let box = document.getElementById(`prevBox_${numLigne}`); let img = document.getElementById(`prevImg_${numLigne}`);
    if (input.files && input.files) {
        let reader = new FileReader();
        reader.onload = function(e) {
            let imageTemporaire = new Image();
            imageTemporaire.onload = function() {
                let canvas = document.createElement('canvas'); let max_size = 800;
                let width = imageTemporaire.width; let height = imageTemporaire.height;
                if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } } 
                else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(imageTemporaire, 0, 0, width, height);
                let dataUrlCalibre = canvas.toDataURL('image/jpeg', 0.7);
                if (img) img.src = dataUrlCalibre; if (box) box.style.display = 'block';
            };
            imageTemporaire.src = e.target.result;
        };
        reader.readAsDataURL(input.files);
    }
}

function ajouterUnSignataire(texteParDefaut = "") {
    if (compteurSignataires >= MAX_SIGNATAIRES) return alert("Limite de 12 signataires.");
    compteurSignataires++; let zone = document.getElementById('zoneSignatures'); let card = document.createElement('div');
    card.className = "signature-card"; card.id = `sigCard_${compteurSignataires}`;
    let placeHolderText = texteParDefaut || "Nom du responsable\nFonction / Entité";
    card.innerHTML = `<button class="btn-del-sig" onclick="retirerSignataire(${compteurSignataires})">&times;</button><textarea class="signature-title-input" rows="2" style="text-align:center;" oninput="ajusterHauteurTextarea(this)">${placeHolderText}</textarea><div style="font-size:11px; color:#a1a1aa; font-style:italic;">(Signature & Cachet)</div>`;
    zone.appendChild(card);
}
function retirerSignataire(id) { let card = document.getElementById(`sigCard_${id}`); if(card) { card.remove(); compteurSignataires--; } }

async function sauvegarderPVChantier() {
    let site = document.getElementById('siteSaisie') ? document.getElementById('siteSaisie').value.trim() : "";
    let datePV = document.getElementById('dateSaisie') ? document.getElementById('dateSaisie').value : new Date().toLocaleDateString('fr-FR');
    if(!site) return alert("Veuillez renseigner le nom du site avant d'enregistrer !");
    
    let photosEnvoyeesCCPMS = 0;
    let armoireSauvee = await lireDonneeDB("dossiers_techniques", `ccpms_${idProjetUnique}`) || [];
    let toutesLesLignes = document.querySelectorAll('[id^="ligneConstat_"]');
    
    toutesLesLignes.forEach((conteneurLigne, index) => {
        let i = conteneurLigne.id.split('_')[1]; 
        let imgElement = document.getElementById(`prevImg_${i}`);
        let zoneTexte = conteneurLigne.querySelector('textarea');
        let textConstat = zoneTexte ? zoneTexte.value.trim() : "";
        if (imgElement && imgElement.src && imgElement.src.startsWith("data:image")) {
            armoireSauvee.unshift({
                id: Date.now() + parseInt(i), categorie: "Photos", dateDoc: new Date().toISOString().substring(0,10),
                titre: `[PV] - Constat Terrain N°${index + 1}`, description: `Site : ${site}\nDate : ${datePV}\nObservations : ${textConstat}`,
                fichierBrut: imgElement.src, nomFichier: `Photo_PV_Constat_${i}_${idProjetUnique}.jpg`, typeMime: "image/jpeg"
            });
            photosEnvoyeesCCPMS++;
        }
    });
    
    await ecrireDonneeDB("dossiers_techniques", armoireSauvee, `ccpms_${idProjetUnique}`);
    alert(`✔️ Succès total !\nLe PV a été figé en mémoire.\n📸 Automatisation : ${photosEnvoyeesCCPMS} photo(s) ont alimenté l'armoire GED CCPMS de ce projet !`);
}
</script>
</body>
</html>
