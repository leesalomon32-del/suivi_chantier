<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Génie Civil Pro - Procès-Verbal de Chantier Isolé</title>
    <style>
        :root {
            --primary-color: #0f172a;
            --secondary-color: #3b82f6;
            --success-color: #16a34a;
            --bg-color: #f8fafc;
            --text-color: #111827;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .top-navbar { display: flex; justify-content: space-between; align-items: center; background: #0f172a; color: white; padding: 15px 20px; border-radius: 6px; margin-bottom: 25px; }
        .top-navbar-title { font-weight: bold; font-size: 16px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .nav-buttons { display: flex; gap: 10px; }
        
        .btn { padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; display: inline-flex; align-items: center; gap: 5px; font-size: 13px; }
        .btn-success { background-color: var(--success-color); }
        .btn-primary { background-color: var(--secondary-color); }
        .btn-secondary { background-color: #64748b; }

        .entete-master { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        .entete-master td { border: 1px solid #cbd5e1; padding: 8px 12px; font-size: 12px; vertical-align: middle; }
        .lbl-gray { background-color: #f8fafc; font-weight: bold; width: 150px; color: #334155; }
        .logo-box { width: 80px; text-align: center; padding: 4px !important; }
        .pv-titre-cadre { text-align: center; border-top: 2px solid #1e3a8a; border-bottom: 2px solid #1e3a8a; padding: 10px 0; margin-bottom: 25px; }
        .pv-titre-input { width: 90%; border: none; font-size: 16px; font-weight: bold; color: #1e3a8a; text-align: center; text-transform: uppercase; outline: none; }
        
        .meta-saisie-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 15px; margin-bottom: 25px; background: #f8fafc; padding: 12px; border-radius: 4px; border: 1px solid #e2e8f0; }
        .field-row { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: bold; }
        .field-row input { padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 4px; flex-grow: 1; font-size: 13px; }

        .table-constats { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .table-constats th { background-color: #0f172a; color: white; padding: 10px; font-size: 12px; text-align: left; }
        .table-constats td { border: 1px solid #cbd5e1; padding: 8px; font-size: 13px; vertical-align: top; }
        .textarea-cell { width: 98%; border: none; resize: none; font-family: inherit; font-size: 13px; outline: none; min-height: 40px; overflow-y: hidden; }
        
        .signatures-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .signature-card { border: 1px dashed #cbd5e1; padding: 12px; text-align: center; border-radius: 4px; position: relative; background: #f8fafc; }
        .signature-title-input { width: 90%; border: none; background: transparent; text-align: center; font-weight: bold; font-size: 13px; outline: none; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; margin-bottom: 45px; resize: none; overflow: hidden; }
        .btn-del-sig { position: absolute; top: 2px; right: 2px; cursor: pointer; color: #ef4444; font-weight: bold; font-size: 14px; background: none; border: none; }

        @media print {
            body { padding: 0; background: white; }
            .container { box-shadow: none; padding: 0; max-width: 100%; }
            .top-navbar, .btn, .btn-del-sig, input[type="file"], #formActionsPV { display: none !important; }
            input, textarea { border: none !important; background: transparent !important; resize: none !important; }
            .signature-card { border: none !important; background: transparent !important; }
            tr { page-break-inside: avoid !important; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-navbar">
        <div class="top-navbar-title">📋 Compte-Rendu & Procès-Verbal</div>
        <div class="nav-buttons">
            <button class="btn btn-secondary" onclick="window.location.href='3_accueil.html'">« Retour Accueil</button>
            <button class="btn btn-success" onclick="sauvegarderPVChantier()">💾 Sauvegarder le PV</button>
            <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimer en PDF</button>
        </div>
    </div>

    <!-- TABLEAU MAITRE D'EN-TÊTE AUTOMATIQUE -->
            <!-- TABLEAU MAITRE D'EN-TÊTE AUTOMATIQUE AVEC LOGOS ALIGNÉS -->
    <table class="entete-master" style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
        <tr>
            <td class="lbl-gray" style="width: 180px;">Objet du Marché :</td>
            <td id="viewObjet" style="font-weight:bold; color:var(--primary-blue);">-</td>
            <td style="width: 80px; text-align: center; border: 1px solid #cbd5e1; padding: 2px;" id="pvLogoMO"></td>
        </tr>
        <tr>
            <td class="lbl-gray">Bailleur / Financement :</td>
            <td id="viewFinancement">-</td>
            <td style="width: 80px; text-align: center; border: 1px solid #cbd5e1; padding: 2px;" id="pvLogoFin"></td>
        </tr>
        <tr>
            <td class="lbl-gray">Maître d'Ouvrage :</td>
            <td id="viewMO">-</td>
            <td style="width: 80px; text-align: center; border: 1px solid #cbd5e1; padding: 2px;" id="pvLogoMOE"></td>
        </tr>
        <tr>
            <td class="lbl-gray">Maître d'Œuvre :</td>
            <td id="viewMOE">-</td>
            <td style="width: 80px; text-align: center; border: 1px solid #cbd5e1; padding: 2px;" id="pvLogoEntreprise"></td>
        </tr>
        <tr>
            <td class="lbl-gray">Entreprise Titulaire :</td>
            <td id="viewEntreprise" colspan="2">-</td>
        </tr>
        <tr>
            <td class="lbl-gray">N° de Contrat / Marché :</td>
            <td id="viewNumContrat" style="font-family:monospace; color:var(--accent-blue);" colspan="2">-</td>
        </tr>
    </table>

        
    <div class="pv-titre-cadre">
        <input type="text" id="titrePV" class="pv-titre-input" value="PV DE CONSTATATION DE VISITE DE CHANTIER">
    </div>

    <div class="meta-saisie-grid">
        <div class="field-row"><label>Date :</label><input type="text" id="dateSaisie" placeholder="Ex: 28/06/2026"></div>
        <div class="field-row"><label>Site :</label><input type="text" id="siteSaisie" placeholder="Ex: CSB II Ambohipo"></div>
    </div>

    <table class="table-constats" id="tableConstatsBody">
        <thead>
            <tr>
                <th style="width: 40px; text-align: center;">N°</th>
                <th style="width: 350px;">Constats</th>
                <th style="width: 350px;">Observations / Recommandations</th>
                <th style="width: 250px;">Photos Illustratives</th>
            </tr>
        </thead>
        <tbody id="tbodyConstats"></tbody>
    </table>

    <div id="formActionsPV" style="margin-bottom: 30px;">
        <button class="btn btn-primary" onclick="ajouterLigneConstat()">➕ Ajouter une ligne de constat</button>
    </div>

    <div class="signatures-section" id="zoneSignatures"></div>
    
    <div id="formActionsPV" style="text-align: center; margin-top: 20px;">
        <button class="btn btn-secondary" onclick="ajouterUnSignataire()">👥 Ajouter un signataire</button>
    </div>
</div>
<script>
    let compteurLignes = 0;
    let compteurSignataires = 0;
    const MAX_SIGNATAIRES = 12;

        // --- CONNECTEURS GLOBAUX SÉCURISÉS ---
    let idProjetUnique = localStorage.getItem("id_projet_en_cours_de_saisie_temporaire") || "101";
    let cleStockageCCPMS = `ccpms_${idProjetUnique}`;

         window.onload = function() {
        if (localStorage.getItem("session_securisee_active_gc") !== "VALIDE") {
            window.location.href = "1_login.html"; return;
        }

        // 1. RE-LECTURE DE L'ARMOIRE MAÎTRESSE ET ALIMENTATION DU CADRE CONTRACTUEL
        let masterSauve = localStorage.getItem("base_donnees_fiche_projet_maitre");
        let classeurGlobal = localStorage.getItem("classeur_maitre_projets_lee") ? JSON.parse(localStorage.getItem("classeur_maitre_projets_lee")) : [];
        let idProjetUnique = localStorage.getItem("id_projet_en_cours_de_saisie_temporaire") || "101";
        let pActuel = classeurGlobal.find(i => i.id == idProjetUnique);

        if (masterSauve) {
            let n = JSON.parse(masterSauve);
            
            let objetPVText = n.objet || "-";
            if (pActuel && pActuel.type === "ENFANT" && pActuel.parentId) {
                let papa = classeurGlobal.find(i => i.id == pActuel.parentId);
                if (papa) objetPVText = `${papa.nom.toUpperCase()} — LOT : ${pActuel.nom.toUpperCase()}`;
            }

            // Alignement strict sur tes vrais ID d'en-tête
            if(document.getElementById('viewObjet')) document.getElementById('viewObjet').innerText = objetPVText;
            if(document.getElementById('viewFinancement')) document.getElementById('viewFinancement').innerText = n.financement || "-";
            if(document.getElementById('viewMO')) document.getElementById('viewMO').innerText = n.mo || "-";
            if(document.getElementById('viewMOE')) document.getElementById('viewMOE').innerText = n.moe || "-";
            if(document.getElementById('viewEntreprise Titulaire')) document.getElementById('viewEntreprise Titulaire').innerText = n.entreprise || "-";
            if(document.getElementById('viewNumContrat')) document.getElementById('viewNumContrat').innerText = n.numContrat || "-";
            
            // Injection automatique des 4 logos officiels
            if(document.getElementById('pvLogoMO')) document.getElementById('pvLogoMO').innerHTML = n.logoMO_html || "<b>MAÎTRE D'OUVRAGE</b>";
            if(document.getElementById('pvLogoFin')) document.getElementById('pvLogoFin').innerHTML = n.logoFin_html || "<b>BAILLEUR DE FONDS</b>";
            if(document.getElementById('pvLogoMOE')) document.getElementById('pvLogoMOE').innerHTML = n.logoMOE_html || "<b>MISSION DE CONTROLE</b>";
            if(document.getElementById('pvLogoEntreprise')) document.getElementById('pvLogoEntreprise').innerHTML = n.logoEntreprise_html || "<b>ENTREPRISE TITULAIRE</b>";
        }

        // 2. PRÉ-REMPLISSAGE AUTOMATIQUE DU CHAMP SITE
        let elSite = document.getElementById('siteSaisie');
        if(elSite && pActuel) {
            elSite.value = pActuel.nom.toUpperCase();
        }

        // 3. MATRICE DE RESTRICTION POUR LES CADRES (LECTURE SEULE)
        let roleSession = localStorage.getItem("session_user_role") || "agents";
        if (roleSession === "cadres") {
            let btnAjout = document.getElementById('btnAjouterLigneConstat'); if(btnAjout) btnAjout.style.display = 'none';
            let btnSave = document.querySelector('.btn-success'); if(btnSave) btnSave.innerHTML = "🔒 PV en Lecture Seule (Cadre)";
        }

        // RELANCE DE TES FONCTIONS INTERNES D'ORIGINE POUR FEUILLETER LE TABLEAU DE SAISIE
        if(typeof recupererEnteteFicheProjetAccueil === "function") {
            recupererEnteteFicheProjetAccueil();
        } else if(typeof rechargerTout === "function") {
            rechargerTout();
        }
    };
   



   function recupererEnteteFicheProjetAccueil() {
    let classeurGlobal = localStorage.getItem("classeur_maitre_projets_lee") ? JSON.parse(localStorage.getItem("classeur_maitre_projets_lee")) : [];
    let idProjetUnique = localStorage.getItem("id_projet_en_cours_de_saisie_temporaire") || "101";
    let pActuel = classeurGlobal.find(i => i.id == idProjetUnique);

    if (pActuel) {
        // Lecture de la charte de ce lot précis
        let charteSpecifique = localStorage.getItem(`charte_administrative_${idProjetUnique}`);
        let d = charteSpecifique ? JSON.parse(charteSpecifique) : {};

        // Récupération de l'héritage du vrai père
        let m = {};
        if (pActuel.type === 'ENFANT' && pActuel.parentId) {
            let parentSauve = localStorage.getItem(`charte_administrative_${pActuel.parentId}`);
            if (parentSauve) m = JSON.parse(parentSauve);
        }
        
        let objetPVText = pActuel.nom.toUpperCase();
        if (pActuel.type === "ENFANT" && pActuel.parentId) {
            let papa = classeurGlobal.find(i => i.id == pActuel.parentId);
            if (papa) objetPVText = `${papa.nom.toUpperCase()} — LOT : ${pActuel.nom.toUpperCase()}`;
        }

        // Injection rigoureuse des textes isolés
        if(document.getElementById('viewObjet')) document.getElementById('viewObjet').innerText = objetPVText;
        if(document.getElementById('viewFinancement')) document.getElementById('viewFinancement').innerText = d.financement || m.financement || "-";
        if(document.getElementById('viewMO')) document.getElementById('viewMO').innerText = d.mo || m.mo || "-";
        if(document.getElementById('viewMOE')) document.getElementById('viewMOE').innerText = d.moe || m.moe || "-";
        
        let elEnt = document.getElementById('viewEntreprise') || document.getElementById('viewEntreprise Titulaire');
        if(elEnt) elEnt.innerText = d.entreprise || m.entreprise || "-";
        if(document.getElementById('viewNumContrat')) document.getElementById('viewNumContrat').innerText = d.numContrat || m.numContrat || "-";
        
        // Injection des logos du lot ou du père hérité
        let sourceLogos = pActuel.type === 'ENFANT' ? m : d;
        let styleStyle = 'style="max-height:24px; max-width:100%; object-fit:contain; vertical-align:middle;"';
        if(document.getElementById('pvLogoMO') && sourceLogos.logoMO_html) document.getElementById('pvLogoMO').innerHTML = sourceLogos.logoMO_html.replace('<img', `<img ${styleStyle}`);
        if(document.getElementById('pvLogoFin') && sourceLogos.logoFin_html) document.getElementById('pvLogoFin').innerHTML = sourceLogos.logoFin_html.replace('<img', `<img ${styleStyle}`);
        if(document.getElementById('pvLogoMOE') && sourceLogos.logoMOE_html) document.getElementById('pvLogoMOE').innerHTML = sourceLogos.logoMOE_html.replace('<img', `<img ${styleStyle}`);
        if(document.getElementById('pvLogoEntreprise') && sourceLogos.logoEntreprise_html) document.getElementById('pvLogoEntreprise').innerHTML = sourceLogos.logoEntreprise_html.replace('<img', `<img ${styleStyle}`);
    }

    if(typeof afficherTableauConstats === "function") afficherTableauConstats();
}



    function ajouterLigneConstat() {
        compteurLignes++;
        let tbody = document.getElementById('tbodyConstats');
        let tr = document.createElement('tr');
        tr.id = `ligneConstat_${compteurLignes}`;

        tr.innerHTML = `
            <td style="text-align:center; font-weight:bold; padding-top:12px;">${compteurLignes}</td>
            <td><textarea class="textarea-cell" placeholder="Saisir le constat visuel..." oninput="ajusterHauteurTextarea(this)"></textarea></td>
            <td><textarea class="textarea-cell" placeholder="Directives / Recommandations..." oninput="ajusterHauteurTextarea(this)"></textarea></td>
            <td>
                <input type="file" accept="image/*" id="imgInput_${compteurLignes}" onchange="previsualiserPhotoConstat(${compteurLignes}, this)">
                <div id="prevBox_${compteurLignes}" style="margin-top:5px; max-width:200px; display:none;">
                    <img id="prevImg_${compteurLignes}" style="width:100%; max-height:120px; object-fit:contain; border-radius:4px; border:1px solid #cbd5e1;">
                </div>
            </td>
        `;
        tbody.appendChild(tr);
    }

    function ajusterHauteurTextarea(element) {
        element.style.height = "auto";
        element.style.height = element.scrollHeight + "px";
    }
</script>
<script>
   function previsualiserPhotoConstat(numLigne, input) {
    let box = document.getElementById(`prevBox_${numLigne}`);
    let img = document.getElementById(`prevImg_${numLigne}`);
    
    if (input.files && input.files[0]) {
        let reader = new FileReader();
        reader.onload = function(e) {
            let imageTemporaire = new Image();
            imageTemporaire.onload = function() {
                // Création du Canvas de redimensionnement
                let canvas = document.createElement('canvas');
                let max_size = 800; // Taille optimale pour un rapport A4 paysage net
                let width = imageTemporaire.width;
                let height = imageTemporaire.height;

                if (width > height) {
                    if (width > max_size) { height *= max_size / width; width = max_size; }
                } else {
                    if (height > max_size) { width *= max_size / height; height = max_size; }
                }
                canvas.width = width;
                canvas.height = height;

                let ctx = canvas.getContext('2d');
                ctx.drawImage(imageTemporaire, 0, 0, width, height);

                // Compression JPEG stricte à 70% (Divise le poids par 50 !)
                let dataUrlCalibre = canvas.toDataURL('image/jpeg', 0.7);
                
                // Injection dans ta balise image d'origine
                if (img) {
                    img.src = dataUrlCalibre;
                    img.style.display = 'block';
                }
                if (box) box.style.display = 'block';
            };
            imageTemporaire.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }
}
 

    function ajouterUnSignataire(texteParDefaut = "") {
        if (compteurSignataires >= MAX_SIGNATAIRES) { alert("Limite de 12 signataires."); return; }
        compteurSignataires++;
        let zone = document.getElementById('zoneSignatures'); let card = document.createElement('div');
        card.className = "signature-card"; card.id = `sigCard_${compteurSignataires}`;
        let placeHolderText = texteParDefaut || "Nom du responsable\nFonction / Entité";
        card.innerHTML = `<button class="btn-del-sig" onclick="retirerSignataire(${compteurSignataires})">&times;</button><textarea class="signature-title-input" rows="2" style="text-align:center;" oninput="ajusterHauteurTextarea(this)">${placeHolderText}</textarea><div style="font-size:11px; color:#a1a1aa; font-style:italic;">(Signature & Cachet)</div>`;
        zone.appendChild(card);
    }

    function retirerSignataire(id) { let card = document.getElementById(`sigCard_${id}`); if(card) { card.remove(); compteurSignataires--; } }

    // --- LE PONT D'ÉTIANCHÉITÉ AUTOMATIQUE VERS LA GED CCPMS DU SOUS-PROJET ACTIF ---
       // --- LE PONT D'ÉTANCHÉITÉ ET D'ENREGISTREMENT DU PV CORRIGÉ ---
   function sauvegarderPVChantier() {
    let titre = "PV de Constat";
    let elSite = document.getElementById('siteSaisie');
    let site = elSite ? elSite.value.trim() : "";
    let elDate = document.querySelector('input[type="date"]') || document.querySelector('input[placeholder*="2026"]');
    let datePV = elDate ? elDate.value : new Date().toLocaleDateString('fr-FR');
    
    if(!site) { 
        alert("⚠️ Veuillez renseigner le nom du site avant d'enregistrer !"); 
        return; 
    }

    let photosEnvoyeesCCPMS = 0;
    
    // CORRECTION ICI : Utilisation stricte de la variable idProjetUnique déclarée au sommet de ton script
    let idUniquePourSauvegarde = localStorage.getItem("id_projet_en_cours_de_saisie_temporaire") || "101";
    let ccpmsSauve = localStorage.getItem(`ccpms_${idUniquePourSauvegarde}`);
    let listeCCPMS = ccpmsSauve ? JSON.parse(ccpmsSauve) : [];

    let toutesLesLignes = document.querySelectorAll('[id^="ligneConstat_"]');
    
    toutesLesLignes.forEach((conteneurLigne, index) => {
        let i = conteneurLigne.id.split('_')[1]; 
        let imgElement = document.getElementById(`prevImg_${i}`);
        
        let zoneTexte = conteneurLigne.querySelector('textarea');
        let textConstat = zoneTexte ? zoneTexte.value.trim() : "";

        if (imgElement && imgElement.src && imgElement.src.startsWith("data:image")) {
            let nouvelleFichePhoto = {
                id: Date.now() + parseInt(i),
                categorie: "Photos",
                dateDoc: new Date().toISOString().substring(0,10),
                titre: `[PV] - Constat Terrain N°${index + 1}`,
                description: `Site : ${site}\nDate de visite : ${datePV}\nObservations : ${textConstat}`,
                fichierBrut: imgElement.src,
                nomFichier: `Photo_PV_Constat_${i}_${idUniquePourSauvegarde}.jpg`,
                typeMime: "image/jpeg"
            };
            listeCCPMS.unshift(nouvelleFichePhoto);
            photosEnvoyeesCCPMS++;
        }
    });
    
    // Sauvegarde physique locale et étanche
    localStorage.setItem(`ccpms_${idUniquePourSauvegarde}`, JSON.stringify(listeCCPMS)); 
    
    alert(`💾 Succès total !\nLe Procès-Verbal a été enregistré en mémoire.\n📸 Automatisation : ${photosEnvoyeesCCPMS} photo(s) illustrative(s) ont alimenté l'armoire CCPMS de ce projet !`);
    // COMPORTEMENT CLOUD : Propulsion instantanée du PV dans la banque de données globale
    if (typeof parent.pousserModificationTerrainVersCloudMiroir === 'function') {
        parent.pousserModificationTerrainVersCloudMiroir();
    } else {
        let baseProjets = localStorage.getItem("classeur_maitre_projets_lee") || "[]";
        let baseUsers = localStorage.getItem("matrice_utilisateurs_rbac_gc") || "[]";
        let masterFiche = localStorage.getItem("base_donnees_fiche_projet_maitre") || "{}";
        let paquetGlobalData = { dateExport: new Date().toISOString(), projets: JSON.parse(baseProjets), utilisateurs: JSON.parse(baseUsers), ficheMaitrePapa: JSON.parse(masterFiche) };
        localStorage.setItem("CLOUD_MIRROR_SNAPSHOT", JSON.stringify(paquetGlobalData));
    }

}
 
 
</script>
</body>
</html>
