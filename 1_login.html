<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Génie Civil Pro - Connexion</title>
    <!-- On connecte notre fichier de secours magique créé juste avant -->
    <script src="config.js"></script>
    <style>
        :root {
            --primary-dark: #0f172a;
            --accent-blue: #2563eb;
            --bg-light: #f8fafc;
            --text-dark: #334155;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-light); 
            color: var(--text-dark); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: var(--card-shadow); 
            width: 100%; 
            max-width: 400px; 
            box-sizing: border-box; 
        }
        h2 { 
            color: var(--primary-dark); 
            margin-top: 0; 
            text-align: center; 
            text-transform: uppercase; 
            font-size: 20px; 
        }
        .form-group { 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
            margin-bottom: 15px; 
        }
        label { 
            font-size: 12px; 
            font-weight: bold; 
            text-transform: uppercase; 
        }
        input { 
            padding: 10px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            font-size: 14px; 
            outline: none; 
        }
        .btn { 
            width: 100%; 
            padding: 10px; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            color: white; 
            background-color: var(--accent-blue); 
            text-transform: uppercase; 
            font-size: 13px; 
        }
        .btn-backup {
            background-color: #16a34a;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h2>Génie Civil Pro 🏢</h2>
    <div class="form-group">
        <label>Identifiant Agent</label>
        <input type="text" id="username" placeholder="Ex: agent.boeny">
    </div>
    <div class="form-group">
        <label>Mot de passe secret</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn" onclick="tenterConnexionLocale()">Entrer dans la Console 🚀</button>
    
    <div style="border-top: 1px dashed #cbd5e1; margin-top: 20px; padding-top: 15px; text-align: center;">
        <span style="font-size: 10px; font-weight: bold; color: #64748b; text-transform: uppercase;">Restauration d'urgence :</span>
        <label class="btn btn-backup" style="display: block; text-align: center; line-height: 20px;">
            Injecter JSON Local 📥
            <input type="file" style="display: none;" onchange="restaurerBaseDepuisJsonLocal(this)">
        </label>
    </div>
</div>
<script>
// ==========================================
// BLOC 2 : LE MOTEUR JAVASCRIPT LOCAL
// ==========================================

// Au démarrage, on vérifie si la base des utilisateurs existe.
// Si elle est vide, on crée un compte "admin" avec le mot de passe "mada2026" pour pouvoir se connecter.
window.onload = function() {
    let utilisateursExistants = localStorage.getItem("matrice_utilisateurs_rbac_gc");
    if (!utilisateursExistants) {
        let premierAdmin = [{ id: "1", login: "admin", pass: "mada2026", role: "admin", lots: ["101", "102", "103"] }];
        localStorage.setItem("matrice_utilisateurs_rbac_gc", JSON.stringify(premierAdmin));
    }
    
    // On crée aussi des projets de démonstration si le stockage est tout neuf
    if (!localStorage.getItem("classeur_maitre_projets_lee")) {
        let projetsDemo = [
            { id: "101", nom: "MARCHE CENTRAL 52 ECOLES", type: "PAPA", parentId: null, photoEmplacement: "", bloc_notes: "" },
            { id: "102", nom: "Lot 1 - Arrondissement 4", type: "ENFANT", parentId: "101", photoEmplacement: "", bloc_notes: "" },
            { id: "103", nom: "Lot 2 - Arrondissement 5", type: "ENFANT", parentId: "101", photoEmplacement: "", bloc_notes: "" }
        ];
        localStorage.setItem("classeur_maitre_projets_lee", JSON.stringify(projetsDemo));
    }
};

// Fonction pour vérifier l'identifiant et le mot de passe localement
function tenterConnexionLocale() {
    let nomSaisi = document.getElementById('username').value.trim();
    let codeSaisi = document.getElementById('password').value.trim();
    
    if (!nomSaisi || !codeSaisi) {
        return alert("Veuillez remplir tous les champs !");
    }
    
    // Sécurité de secours intégrée en dur (comme dans ton prototype)
    if (nomSaisi === "lee" && codeSaisi === "SEAP2026") {
        localStorage.setItem("session_securisee_active_gc", "VALIDE");
        localStorage.setItem("session_user_login", "lee");
        localStorage.setItem("session_user_role", "admin");
        localStorage.setItem("session_user_lots", JSON.stringify(["101", "102", "103"]));
        window.location.href = "3_accueil.html";
        return;
    }
    
    // Sinon, on cherche dans notre liste d'utilisateurs locaux
    let listeUsers = JSON.parse(localStorage.getItem("matrice_utilisateurs_rbac_gc") || "[]");
    let utilisateurTrouve = listeUsers.find(u => u.login === nomSaisi && u.pass === codeSaisi);
    
    if (utilisateurTrouve) {
        localStorage.setItem("session_securisee_active_gc", "VALIDE");
        localStorage.setItem("session_user_login", utilisateurFound.login);
        localStorage.setItem("session_user_role", utilisateurFound.role);
        localStorage.setItem("session_user_lots", JSON.stringify(utilisateurFound.lots));
        window.location.href = "3_accueil.html";
    } else {
        alert("❌ Identifiant ou mot de passe incorrect !");
    }
}

// L'IMPORTATEUR UNIVERSEL : Il aspire et range TOUT d'un coup dans le navigateur
function restaurerBaseDepuisJsonLocal(input) {
    if (input.files && input.files[0]) {
        let reader = new FileReader();
        reader.onload = function(e) {
            try {
                let paquet = JSON.parse(e.target.result);
                
                // On vérifie que c'est bien un fichier Génie Civil Pro valide
                if (!paquet.projets && !paquet.classeur_maitre_projets_lee) {
                    return alert("❌ Ce fichier JSON n'est pas valide pour Génie Civil Pro.");
                }
                
                if (confirm("⚠️ ATTENTION : Valider la restauration ? Cela va écraser les données actuelles de ton écran.")) {
                    
                    // 1. Restauration des Projets et Utilisateurs
                    let listeDesProjets = paquet.projets || paquet.classeur_maitre_projets_lee;
                    localStorage.setItem("classeur_maitre_projets_lee", JSON.stringify(listeDesProjets));
                    
                    if (paquet.utilisateurs) localStorage.setItem("matrice_utilisateurs_rbac_gc", JSON.stringify(paquet.utilisateurs));
                    if (paquet.ficheMaitrePapa) localStorage.setItem("base_donnees_fiche_projet_maitre", JSON.stringify(paquet.ficheMaitrePapa));
                    if (paquet.bdqe) localStorage.setItem("base_donnees_bdqe_global", JSON.stringify(paquet.bdqe));
                    if (paquet.ccpms) localStorage.setItem("base_donnees_ccpms_global", JSON.stringify(paquet.ccpms));
                    if (paquet.avenants) localStorage.setItem("base_donnees_avenants_global", JSON.stringify(paquet.avenants));
                    if (paquet.planning) localStorage.setItem("base_donnees_planning_gantt", JSON.stringify(paquet.planning));
                    if (paquet.suiviAvancement) localStorage.setItem("base_donnees_suivi_avancement_travaux", JSON.stringify(paquet.suiviAvancement));
                    
                    // 2. Restauration des tiroirs de données spécifiques à chaque lot (BDQE, Suivi, Armoire)
                    if (paquet.chartesIsolees) { for (let id in paquet.chartesIsolees) localStorage.setItem(`charte_administrative_${id}`, JSON.stringify(paquet.chartesIsolees[id])); }
                    if (paquet.bdqeIsolees) { for (let id in paquet.bdqeIsolees) localStorage.setItem(`bdqe_${id}`, JSON.stringify(paquet.bdqeIsolees[id])); }
                    if (paquet.ccpmsIsolees) { for (let id in paquet.ccpmsIsolees) localStorage.setItem(`ccpms_${id}`, JSON.stringify(paquet.ccpmsIsolees[id])); }
                    if (paquet.suiviIsolees) { for (let id in paquet.suiviIsolees) localStorage.setItem(`suivi_${id}`, JSON.stringify(paquet.suiviIsolees[id])); }
                    if (paquet.planningIsolees) { for (let id in paquet.planningIsolees) localStorage.setItem(`planning_${id}`, JSON.stringify(paquet.planningIsolees[id])); }
                    
                    alert("🎉 Félicitations ! Toute la base de données a été réinjectée localement avec succès.");
                    window.location.reload();
                }
            } catch (err) {
                console.error(err);
                alert("❌ Erreur lors de la lecture du fichier JSON.");
            }
        };
        reader.readAsText(input.files[0], 'UTF-8');
    }
}
</script>
</body>
</html>
