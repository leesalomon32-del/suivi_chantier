<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Génie Civil Pro - Connexion</title>
    <!-- On connecte notre fichier de secours magique créé juste avant -->
    <script src="config.js"></script>
    <style>
        :root {
            --primary-dark: #0f172a;
            --accent-blue: #2563eb;
            --bg-light: #f8fafc;
            --text-dark: #334155;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-light); 
            color: var(--text-dark); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: var(--card-shadow); 
            width: 100%; 
            max-width: 400px; 
            box-sizing: border-box; 
        }
        h2 { 
            color: var(--primary-dark); 
            margin-top: 0; 
            text-align: center; 
            text-transform: uppercase; 
            font-size: 20px; 
        }
        .form-group { 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
            margin-bottom: 15px; 
        }
        label { 
            font-size: 12px; 
            font-weight: bold; 
            text-transform: uppercase; 
        }
        input { 
            padding: 10px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            font-size: 14px; 
            outline: none; 
        }
        .btn { 
            width: 100%; 
            padding: 10px; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            color: white; 
            background-color: var(--accent-blue); 
            text-transform: uppercase; 
            font-size: 13px; 
        }
        .btn-backup {
            background-color: #16a34a;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h2>Génie Civil Pro 🏢</h2>
    <div class="form-group">
        <label>Identifiant Agent</label>
        <input type="text" id="username" placeholder="Ex: agent.boeny">
    </div>
    <div class="form-group">
        <label>Mot de passe secret</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn" onclick="tenterConnexionLocale()">Entrer dans la Console 🚀</button>
    
    <div style="border-top: 1px dashed #cbd5e1; margin-top: 20px; padding-top: 15px; text-align: center;">
        <span style="font-size: 10px; font-weight: bold; color: #64748b; text-transform: uppercase;">Restauration d'urgence :</span>
        <label class="btn btn-backup" style="display: block; text-align: center; line-height: 20px;">
            Injecter JSON Local 📥
            <input type="file" style="display: none;" onchange="restaurerBaseDepuisJsonLocal(this)">
        </label>
    </div>
</div>
<script>
const DB_NAME = "GenieCivilPro_DB";
const DB_VERSION = 1;
let dbInstance = null;

// On initialise IndexedDB pour que l'importateur puisse y accéder
function initialiserLeMeubleDB() {
 return new Promise((resolve, reject) => {
   let requete = indexedDB.open(DB_NAME, DB_VERSION);
   requete.onupgradeneeded = function(e) {
     let db = e.target.result;
     if (!db.objectStoreNames.contains("projets")) { db.createObjectStore("projets", { keyPath: "id" }); }
     if (!db.objectStoreNames.contains("utilisateurs")) { db.createObjectStore("utilisateurs", { keyPath: "id" }); }
     if (!db.objectStoreNames.contains("dossiers_techniques")) { db.createObjectStore("dossiers_techniques"); }
   };
   requete.onsuccess = function(e) { dbInstance = e.target.result; resolve(dbInstance); };
   requete.onerror = function() { reject("Erreur meuble"); };
 });
}

function ecrireDonneeDB(tiroir, objet, cleOptionnelle) {
 return new Promise((resolve) => {
   if(!dbInstance) return resolve(false);
   let transaction = dbInstance.transaction([tiroir], "readwrite");
   let magasin = transaction.objectStore(tiroir);
   let requete = cleOptionnelle !== undefined ? magasin.put(objet, cleOptionnelle) : magasin.put(objet);
   requete.onsuccess = () => resolve(true);
   requete.onerror = () => resolve(false);
 });
}

// Au démarrage, on initialise la DB et on crée le compte admin par défaut si besoin
window.onload = async function() {
  await initialiserLeMeubleDB();
  
  // Sécurité complémentaire : configuration du premier utilisateur en DB statique
  let tx = dbInstance.transaction(["utilisateurs"], "readonly");
  let store = tx.objectStore("utilisateurs");
  let req = store.getAll();
  req.onsuccess = async function() {
    if(req.result.length === 0) {
      await ecrireDonneeDB("utilisateurs", { id: 1, login: "admin", pass: "mada2026", role: "admin", lots: ["101", "102", "103"] });
      await ecrireDonneeDB("projets", { id: 101, nom: "MARCHE CENTRAL 52 ECOLES", type: "PAPA", parentId: null });
      await ecrireDonneeDB("projets", { id: 102, nom: "Lot 1 - Arrondissement 4", type: "ENFANT", parentId: 101 });
      await ecrireDonneeDB("projets", { id: 103, nom: "Lot 2 - Arrondissement 5", type: "ENFANT", parentId: 101 });
    }
  };
};

function tenterConnexionLocale() {
  let nomSaisi = document.getElementById('username').value.trim();
  let codeSaisi = document.getElementById('password').value.trim();
  if (!nomSaisi || !codeSaisi) return alert("Veuillez remplir tous les champs !");

  // Sécurité de secours intégrée en dur
  if (nomSaisi === "lee" && codeSaisi === "SEAP2026") {
    localStorage.setItem("session_securisee_active_gc", "VALIDE");
    localStorage.setItem("session_user_login", "lee");
    localStorage.setItem("session_user_role", "admin");
    localStorage.setItem("session_user_lots", JSON.stringify(["101", "102", "103"]));
    window.location.href = "3_accueil.html";
    return;
  }

  // Requête de vérification sur la table IndexedDB
  let tx = dbInstance.transaction(["utilisateurs"], "readonly");
  let req = tx.objectStore("utilisateurs").getAll();
  req.onsuccess = function() {
    let utilisateurTrouve = req.result.find(u => u.login === nomSaisi && u.pass === codeSaisi);
    if (utilisateurTrouve) {
      localStorage.setItem("session_securisee_active_gc", "VALIDE");
      localStorage.setItem("session_user_login", utilisateurTrouve.login);
      localStorage.setItem("session_user_role", utilisateurTrouve.role);
      localStorage.setItem("session_user_lots", JSON.stringify(utilisateurTrouve.lots || []));
      window.location.href = "3_accueil.html";
    } else {
      alert("⚠️ Identifiant ou mot de passe incorrect !");
    }
  };
}
async function restaurerBaseDepuisJsonLocal(input) {
 if (input.files && input.files[0]) {
   let reader = new FileReader();
   reader.onload = async function(e) {
     try {
       let paquet = JSON.parse(e.target.result);
       let listeDesProjets = paquet.projets || paquet.classeur_maitre_projets_lee;
       
       if (!listeDesProjets) {
         return alert("❌ Ce fichier JSON n'est pas valide pour Génie Civil Pro.");
       }
       
       if (confirm("⚠️ ATTENTION : Valider la restauration ? Cela va écraser la totalité de la base de données.")) {
         await initialiserLeMeubleDB();
         
         // On vide proprement les 3 magasins IndexedDB avant réinjection
         let txClear = dbInstance.transaction(["projets", "utilisateurs", "dossiers_techniques"], "readwrite");
         await txClear.objectStore("projets").clear();
         await txClear.objectStore("utilisateurs").clear();
         await txClear.objectStore("dossiers_techniques").clear();
         
         // 1. Restauration des Projets et des Utilisateurs en DB
         for(let prj of listeDesProjets) { await ecrireDonneeDB("projets", prj); }
         
         let listeUsers = paquet.utilisateurs || paquet.matrice_utilisateurs_rbac_gc || [];
         for(let usr of listeUsers) { await ecrireDonneeDB("utilisateurs", usr); }
         
         // 2. Restauration des tiroirs de données spécifiques (Structure unifiée avec Admin/Dashboard)
         if (paquet.chartesIsolees) { 
           for (let id in paquet.chartesIsolees) await ecrireDonneeDB("dossiers_techniques", paquet.chartesIsolees[id], `charte_administrative_${id}`); 
         }
         if (paquet.bdqeIsolees) { 
           for (let id in paquet.bdqeIsolees) await ecrireDonneeDB("dossiers_techniques", paquet.bdqeIsolees[id], `bdqe_${id}`); 
         }
         if (paquet.ccpmsIsolees) { 
           for (let id in paquet.ccpmsIsolees) await ecrireDonneeDB("dossiers_techniques", paquet.ccpmsIsolees[id], `ccpms_${id}`); 
         }
         if (paquet.suiviIsolees) { 
           for (let id in paquet.suiviIsolees) await ecrireDonneeDB("dossiers_techniques", paquet.suiviIsolees[id], `suivi_${id}`); 
         }
         if (paquet.planningIsolees) { 
           for (let id in paquet.planningIsolees) await ecrireDonneeDB("dossiers_techniques", paquet.planningIsolees[id], `planning_${id}`); 
         }
         
         alert("🏆 Félicitations ! Toute la base de données a été réinjectée localement avec succès.");
         window.location.reload();
       }
     } catch (err) {
       console.error(err);
       alert("❌ Erreur lors du décodage ou de l'écriture du fichier JSON.");
     }
   };
   reader.readAsText(input.files[0], 'UTF-8');
 }
}
</script>
</body>
</html>
